<style>
  :root{
    --bg:#f1edfa; --ink:#221c30; --muted:#665e78; --panel:#ffffff; --line:#ddd4ec;
    --pgrad:linear-gradient(175deg,#c3b0f2 0%,#e2c4f0 52%,#fbc6e3 100%);
    --disc-mix:#ffffff; --pmix:76%; --card:#14101c; --cardink:#f4effc;
    --goodt:#0a7d0a; --badt:#b32626;
  }
  @media (prefers-color-scheme:dark){ :root{
    --bg:#0d0a16; --ink:#e6dff2; --muted:#a095b5; --panel:#191225; --line:#2e2440;
    --pgrad:linear-gradient(175deg,#221448 0%,#331754 52%,#43164a 100%);
    --disc-mix:#150f24; --pmix:38%; --card:#0b0813; --cardink:#f1eafc;
    --goodt:#5ad07d; --badt:#ff8080;
  }}
  :root[data-theme="dark"]{
    --bg:#0d0a16; --ink:#e6dff2; --muted:#a095b5; --panel:#191225; --line:#2e2440;
    --pgrad:linear-gradient(175deg,#221448 0%,#331754 52%,#43164a 100%);
    --disc-mix:#150f24; --pmix:38%; --card:#0b0813; --cardink:#f1eafc;
    --goodt:#5ad07d; --badt:#ff8080;
  }
  :root[data-theme="light"]{
    --bg:#f1edfa; --ink:#221c30; --muted:#665e78; --panel:#ffffff; --line:#ddd4ec;
    --pgrad:linear-gradient(175deg,#c3b0f2 0%,#e2c4f0 52%,#fbc6e3 100%);
    --disc-mix:#ffffff; --pmix:76%; --card:#14101c; --cardink:#f4effc;
    --goodt:#0a7d0a; --badt:#b32626;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  .page{max-width:1160px;margin:0 auto;padding:26px 14px 70px}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;color:var(--muted);font-size:12px;gap:10px;flex-wrap:wrap}
  .topbar a{color:inherit}
  button.plain{font:inherit;font-weight:600;font-size:12px;padding:4px 10px;border-radius:8px;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--ink)}

  /* overflow:CLIP, not hidden. `hidden` makes the poster a scroll container, which silently kills
     position:sticky on everything inside it — the scrollytelling coil would just scroll away. clip
     crops identically without creating the container. */
  .poster{position:relative;background:var(--pgrad);border:1px solid var(--line);border-radius:18px;padding:44px 30px 30px;overflow:clip}
  #lifeline{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
  .poster>header,.era,.pfoot{position:relative;z-index:1}

  .poster>header{text-align:center;margin-bottom:34px}
  .poster h1{margin:0;font-size:clamp(30px,6vw,62px);font-weight:850;letter-spacing:.045em;line-height:1.02}
  .poster .sub{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:clamp(14px,2.6vw,26px);letter-spacing:.42em;margin:8px 0 0;font-weight:800;
    background:linear-gradient(90deg,#6247d6,#8a3fd1,#b535bb,#d63d97,#e8446f);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    animation:glitch 7s infinite}
  /* the subtitle glitches: chromatic split + a skip in the tracking, like a bad signal. it fires
     rarely on its own (a tic, not a strobe) and then goes berserk under the cursor — the loop
     shortens to a couple of seconds, so hovering it is what makes the thing misbehave for you. */
  @keyframes glitch{
    0%,88%,100%{text-shadow:none;transform:none;letter-spacing:.42em}
    89%{text-shadow:-4px 0 rgba(240,60,170,.95),4px 0 rgba(60,200,240,.95);transform:translateX(2px) skewX(-2deg)}
    90.5%{text-shadow:4px 1px rgba(240,60,170,.85),-4px -1px rgba(60,200,240,.85);transform:translateX(-3px);letter-spacing:.46em}
    92%{text-shadow:-2px -2px rgba(255,210,63,.9),2px 2px rgba(60,200,240,.8);transform:translateX(1px) skewX(1.5deg)}
    93.5%{text-shadow:5px 0 rgba(240,60,170,.7),-5px 0 rgba(60,200,240,.7);transform:translateX(-1px);letter-spacing:.38em}
    95%{text-shadow:-3px 1px rgba(240,60,170,.6),3px -1px rgba(60,200,240,.6);transform:translateX(2px)}
    96.5%{text-shadow:2px 0 rgba(240,60,170,.45),-2px 0 rgba(60,200,240,.45);transform:none}
  }
  .poster .sub:hover{animation-duration:2.2s}
  .poster .lede{color:var(--muted);font-size:13px;margin:14px auto 0;max-width:66ch}
  .playbtn{font:inherit;font-weight:800;font-size:13px;margin-top:16px;padding:10px 22px;border-radius:999px;cursor:pointer;border:none;color:#fff;
    background:linear-gradient(90deg,#6247d6,#b535bb,#e8446f);box-shadow:0 8px 26px rgba(181,53,187,.45);transition:transform .25s,box-shadow .25s}
  .playbtn:hover{transform:translateY(-2px);box-shadow:0 14px 34px rgba(181,53,187,.6)}
  .era.playpulse .mech .disc{animation:ppop .6s cubic-bezier(.2,.7,.2,1) both;animation-delay:calc(var(--pi,0)*0.045s)}
  @keyframes ppop{0%{transform:scale(1)}45%{transform:scale(1.14)}100%{transform:scale(1)}}
  @media (prefers-reduced-motion:reduce){ .era.playpulse .mech .disc{animation:none} }

  .era{position:relative;display:grid;grid-template-columns:52px 1fr;gap:12px;padding:26px 0 20px;
    border-top:2px solid var(--line);border-top:2px solid color-mix(in srgb,var(--acc) 55%,transparent)}
  .era::before{content:'';position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .7s;
    background:radial-gradient(62% 85% at 50% 50%,color-mix(in srgb,var(--acc) 11%,transparent),transparent 72%)}
  .era.lit::before,.era:hover::before{opacity:1}
  .sparkles{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .7s;z-index:2}
  .era.lit .sparkles,.era:hover .sparkles{opacity:1}
  .sparkles span{position:absolute;line-height:1;text-shadow:0 0 10px currentColor;opacity:0;
    animation:twk var(--td,2.2s) ease-in-out infinite;animation-delay:var(--dl,0s);will-change:transform,opacity}
  @keyframes twk{0%,100%{opacity:0;transform:scale(.25) rotate(0deg)}50%{opacity:.95;transform:scale(1) rotate(100deg)}}
  @media (prefers-reduced-motion:reduce){ .sparkles span{animation:none;opacity:.5} }
  .rail{display:flex;flex-direction:column;align-items:center;gap:10px;padding-top:4px}
  .ename{writing-mode:vertical-rl;transform:rotate(180deg);font-weight:820;letter-spacing:.2em;font-size:13px;color:var(--acc);text-transform:uppercase;font-style:italic}
  :root[data-theme="dark"] .ename{color:color-mix(in srgb,var(--acc) 55%,#efe8fb)}
  @media (prefers-color-scheme:dark){ :root:not([data-theme="light"]) .ename{color:color-mix(in srgb,var(--acc) 55%,#efe8fb)} }
  .eyears{writing-mode:vertical-rl;transform:rotate(180deg);font-size:10.5px;color:var(--muted);letter-spacing:.08em}
  .ebody{display:flex;flex-wrap:wrap;gap:14px 18px;align-items:flex-start;justify-content:center}
  .ecard{background:var(--card);color:var(--cardink);border-radius:16px;padding:13px 15px;width:158px;font-size:11px;line-height:1.45;box-shadow:0 8px 26px rgba(10,6,20,.3)}
  .ecard .et{font-weight:780;font-size:12px;margin-bottom:4px;letter-spacing:.03em;color:var(--cardink);color:color-mix(in srgb,var(--acc) 45%,#ffffff)}
  .ecard .et::before{content:"✳ ";opacity:.85}
  .ecard ul{margin:0;padding:0;list-style:none;opacity:.82}

  .mech{display:flex;flex-direction:column;align-items:center;width:126px;cursor:pointer;outline:none;-webkit-tap-highlight-color:transparent;transition:opacity .3s,filter .3s}
  .disc{position:relative;overflow:hidden;border-radius:50%;display:grid;place-items:center;
    --dgA:color-mix(in srgb,var(--pastel) 88%,#ffffff);
    --dgB:color-mix(in srgb,var(--d0) 38%,#ffffff);
    border:2px solid color-mix(in srgb,var(--d1) 60%,transparent);
    background:var(--panel);background:radial-gradient(circle at 32% 26%,var(--dgA),var(--dgB));
    box-shadow:0 7px 18px color-mix(in srgb,var(--d1) 28%,transparent),inset 0 0 0 1px rgba(255,255,255,.4);
    transition:transform .35s cubic-bezier(.2,.7,.2,1),box-shadow .35s;
    animation:breathe 7s ease-in-out infinite;animation-delay:var(--bd,0s)}
  :root[data-theme="dark"] .disc{--dgA:color-mix(in srgb,var(--pastel) 34%,#171028);--dgB:color-mix(in srgb,var(--d0) 36%,#0e0a1c);box-shadow:0 7px 20px color-mix(in srgb,var(--d1) 36%,transparent),inset 0 0 0 1px rgba(255,255,255,.12)}
  @media (prefers-color-scheme:dark){ :root:not([data-theme="light"]) .disc{--dgA:color-mix(in srgb,var(--pastel) 34%,#171028);--dgB:color-mix(in srgb,var(--d0) 36%,#0e0a1c);box-shadow:0 7px 20px color-mix(in srgb,var(--d1) 36%,transparent),inset 0 0 0 1px rgba(255,255,255,.12)} }
  .disc::after{content:'';position:absolute;left:9%;top:7%;width:46%;height:38%;border-radius:50%;
    background:radial-gradient(closest-side,rgba(255,255,255,.6),rgba(255,255,255,0));pointer-events:none}
  :root[data-theme="dark"] .disc::after{background:radial-gradient(closest-side,rgba(255,255,255,.18),rgba(255,255,255,0))}
  @media (prefers-color-scheme:dark){ :root:not([data-theme="light"]) .disc::after{background:radial-gradient(closest-side,rgba(255,255,255,.18),rgba(255,255,255,0))} }
  .disc svg{width:78%;height:78%;transition:transform .5s cubic-bezier(.2,.7,.2,1)}
  @keyframes breathe{50%{transform:scale(1.025)}}
  .mech .nm{margin-top:7px;font-size:12px;font-weight:680;text-align:center;line-height:1.25}
  .mech .pd{font-size:10px;color:var(--muted);text-align:center;line-height:1.3;margin-top:2px;max-width:120px}
  .mech:hover .disc,.mech:focus-visible .disc,.mech.pinned .disc{transform:scale(1.12);animation-play-state:paused;
    box-shadow:0 18px 48px color-mix(in srgb,var(--d1) 55%,transparent),0 0 0 3px var(--d1),0 0 26px color-mix(in srgb,var(--d1) 45%,transparent)}
  .mech:hover .disc svg,.mech:focus-visible .disc svg,.mech.pinned .disc svg{transform:rotate(10deg) scale(1.06)}
  .ebody:hover .mech:not(:hover):not(.pinned){opacity:.5;filter:saturate(.7)}

  .mech.extra{display:none}
  .era.xp .mech.extra{display:flex;animation:pop .45s cubic-bezier(.2,.7,.2,1) both;animation-delay:var(--pd,0s)}
  @keyframes pop{from{opacity:0;transform:translateY(12px) scale(.85)}}
  .mech.extra .disc{border-style:dashed}
  .mech.unb .disc{border-style:dashed;border-width:2px}
  .mech.unb .nm::after{content:" ✦";color:var(--acc)}
  .more{align-self:center;font:inherit;font-size:12px;font-weight:700;padding:9px 16px;border-radius:999px;cursor:pointer;
    border:1.5px dashed var(--acc);
    background:var(--panel);background:color-mix(in srgb,var(--acc) 10%,transparent);
    color:var(--acc);transition:transform .25s,box-shadow .25s;flex-basis:100%;max-width:290px;margin-top:4px}
  :root[data-theme="dark"] .more{color:color-mix(in srgb,var(--acc) 55%,#efe8fb)}
  @media (prefers-color-scheme:dark){ :root:not([data-theme="light"]) .more{color:color-mix(in srgb,var(--acc) 55%,#efe8fb)} }
  .more:hover{transform:translateY(-2px);box-shadow:0 10px 26px color-mix(in srgb,var(--acc) 35%,transparent)}

  .pfoot{margin-top:26px;display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:11.5px}
  .pfoot a{color:inherit}
  .pfoot .fright{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:5px}
  .pfoot .tbc{color:var(--muted)}
  .pfoot .da{display:inline-flex;align-items:center;gap:9px;color:var(--ink);font-weight:600}
  .pfoot .da svg{height:17px;width:auto;display:block;color:var(--ink)}
  .buy{display:inline-block;font-weight:750;font-size:12px;padding:8px 15px;border-radius:999px;text-decoration:none;
    color:#fff !important;background:linear-gradient(90deg,#b535bb,#e8446f);
    box-shadow:0 6px 18px color-mix(in srgb,#e8446f 40%,transparent);transition:transform .25s,box-shadow .25s}
  .buy:hover{transform:translateY(-2px);box-shadow:0 12px 28px color-mix(in srgb,#e8446f 55%,transparent)}
  .below{color:var(--muted);font-size:12.5px;max-width:92ch;margin:18px 4px 0}
  .below a{color:inherit}

  #tt{position:fixed;pointer-events:none;z-index:60;background:var(--panel);color:var(--ink);border:1px solid var(--line);border-left:3px solid var(--acc,#8b7fb8);border-radius:12px;padding:12px 14px;width:300px;box-shadow:0 14px 44px rgba(10,6,20,.4);font-size:12.5px;display:none}
  #tt.on{display:block}
  #tt .nm{font-weight:760;font-size:15px;line-height:1.2}
  #tt .er{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin:2px 0 7px}
  #tt .er em{color:var(--acc);font-style:normal;font-weight:700}
  #tt .what{margin:0 0 8px;line-height:1.5}
  #tt .note{margin:0 0 8px;color:var(--muted);font-style:italic;font-size:11.5px}
  #tt .gf{display:grid;gap:5px;margin-bottom:8px}
  #tt .gf div{font-size:11.5px;line-height:1.45;padding:6px 9px;border-radius:8px;background:var(--bg)}
  #tt .gf .g{background:color-mix(in srgb,#0ca30c 9%,var(--panel))}
  #tt .gf .b{background:color-mix(in srgb,#d03b3b 8%,var(--panel))}
  #tt .gf .g b{color:var(--goodt)} #tt .gf .b b{color:var(--badt)}
  #tt .genes{display:flex;flex-wrap:wrap;gap:4px}
  #tt .genes span{font-size:10px;border:1px solid var(--line);border-radius:999px;padding:2px 7px;color:var(--muted)}
  #tt .genes span b{color:var(--ink);font-weight:650}
  #tt .hintline{margin-top:8px;color:var(--muted);font-size:10px;border-top:1px solid var(--line);padding-top:6px}

  @media(max-width:720px){
    .poster{padding:30px 12px 20px}
    .era{grid-template-columns:1fr;gap:6px}
    .rail{flex-direction:row;justify-content:flex-start;gap:8px;padding:0 4px}
    .ename,.eyears{writing-mode:horizontal-tb;transform:none}
    .mech{width:104px}
    .ecard{width:47%}
  }
  @media (prefers-reduced-motion:reduce){
    .disc{animation:none}
    .poster .sub{animation:none}
    .era.xp .mech.extra{animation:none}
  }

  /* ---------- tabs + power-mode palette ---------- */
  /* off the print, below the mount — apparatus, not artwork */
  .tabs{display:flex;justify-content:center;gap:8px;margin:20px auto 0;flex-wrap:wrap}
  .tab{font:inherit;font-weight:800;font-size:12.5px;letter-spacing:.04em;padding:8px 18px;border-radius:999px;cursor:pointer;
    border:1.5px solid var(--line);background:var(--panel);color:var(--muted);transition:transform .25s,box-shadow .25s,color .25s}
  .tab:hover{transform:translateY(-1px)}
  .tab .em{margin-right:7px}
  /* the name says which poster; the question says what it is for. the question rides quieter. */
  .tab .tq{font-weight:600;opacity:.6;text-transform:none;letter-spacing:.02em}
  .tab .tq::before{content:"—";margin:0 5px;opacity:.55}
  .tab.on .tq{opacity:.85}
  .tab.on{color:#fff;border-color:transparent}
  .tab.on.t-spiral{background:linear-gradient(90deg,#2f9e44,#e03131,#b535bb,#1c7ed6);box-shadow:0 6px 18px rgba(124,92,255,.4)}
  .tab.on.t-alloc{background:linear-gradient(90deg,#6247d6,#b535bb,#e8446f);box-shadow:0 6px 18px rgba(181,53,187,.4)}
  .tab.on.t-power{background:linear-gradient(90deg,#a06a1f,#b53a35,#8f2f7a);box-shadow:0 6px 18px rgba(168,42,85,.4)}
  .tab.on.t-live{background:linear-gradient(90deg,#3c7d2a,#0e8189,#6247d6);box-shadow:0 6px 18px rgba(14,129,137,.4)}
  .buy.powergrad{background:linear-gradient(90deg,#b0561f,#a82a55)}
  .buy.livegrad{background:linear-gradient(90deg,#1f8a5c,#2b6cb0)}
  :root[data-mode="power"]{--pgrad:linear-gradient(175deg,#eed3ae 0%,#eec4b6 52%,#eab7d2 100%)}
  @media (prefers-color-scheme:dark){ :root[data-mode="power"]:not([data-theme="light"]){--pgrad:linear-gradient(175deg,#331409 0%,#42101c 52%,#33103c 100%)} }
  :root[data-mode="power"][data-theme="dark"]{--pgrad:linear-gradient(175deg,#331409 0%,#42101c 52%,#33103c 100%)}
  :root[data-mode="power"][data-theme="light"]{--pgrad:linear-gradient(175deg,#eed3ae 0%,#eec4b6 52%,#eab7d2 100%)}
  :root[data-mode="power"] .poster .sub{background:linear-gradient(90deg,#a06a1f,#b0561f,#b53a35,#a82a55,#8f2f7a);-webkit-background-clip:text;background-clip:text}
  :root[data-mode="live"]{--pgrad:linear-gradient(175deg,#cfe9b8 0%,#bfe6d2 52%,#bcd9f2 100%)}
  @media (prefers-color-scheme:dark){ :root[data-mode="live"]:not([data-theme="light"]){--pgrad:linear-gradient(175deg,#132a0e 0%,#0c2b26 52%,#141c3f 100%)} }
  :root[data-mode="live"][data-theme="dark"]{--pgrad:linear-gradient(175deg,#132a0e 0%,#0c2b26 52%,#141c3f 100%)}
  :root[data-mode="live"][data-theme="light"]{--pgrad:linear-gradient(175deg,#cfe9b8 0%,#bfe6d2 52%,#bcd9f2 100%)}
  :root[data-mode="live"] .poster .sub{background:linear-gradient(90deg,#3c7d2a,#1f8a5c,#0e8189,#2b6cb0,#6247d6);-webkit-background-clip:text;background-clip:text}
  :root[data-mode="live"] .playbtn{background:linear-gradient(90deg,#3c7d2a,#0e8189,#6247d6);box-shadow:0 8px 26px rgba(14,129,137,.45)}
  :root[data-mode="live"] .playbtn:hover{box-shadow:0 14px 34px rgba(14,129,137,.6)}
  :root[data-mode="power"] .playbtn{background:linear-gradient(90deg,#a06a1f,#b53a35,#8f2f7a);box-shadow:0 8px 26px rgba(168,42,85,.45)}
  :root[data-mode="power"] .playbtn:hover{box-shadow:0 14px 34px rgba(168,42,85,.6)}
  .tab.on.t-truth{background:linear-gradient(90deg,#2a62c0,#6b46d6,#8f3fd1);box-shadow:0 6px 18px rgba(107,70,214,.4)}
  .tab.on.t-identity{background:linear-gradient(90deg,#3e8a1f,#0e8f7a,#2b6cd0);box-shadow:0 6px 18px rgba(14,143,122,.4)}
  .buy.truthgrad{background:linear-gradient(90deg,#2a62c0,#8f3fd1)}
  .buy.identitygrad{background:linear-gradient(90deg,#1f8f4d,#2b6cd0)}
  .buy.trustgrad{background:linear-gradient(90deg,#d4682b,#a83a9e)}
  .buy.recordgrad{background:linear-gradient(90deg,#6e7440,#3a5fd0)}
  .buy.conflictgrad{background:linear-gradient(90deg,#b32626,#4a58d0)}
  .tab.on.t-trust{background:linear-gradient(90deg,#c9820a,#d94f4f,#a83a9e);box-shadow:0 6px 18px rgba(217,79,79,.4)}
  .tab.on.t-record{background:linear-gradient(90deg,#8a6a2a,#4a7d63,#3a5fd0);box-shadow:0 6px 18px rgba(74,125,99,.4)}
  .tab.on.t-conflict{background:linear-gradient(90deg,#b32626,#9c4a63,#4a58d0);box-shadow:0 6px 18px rgba(156,74,99,.4)}
  :root[data-mode="truth"]{--pgrad:linear-gradient(175deg,#bdd7f2 0%,#c8c6f4 52%,#dcc4f2 100%)}
  @media (prefers-color-scheme:dark){ :root[data-mode="truth"]:not([data-theme="light"]){--pgrad:linear-gradient(175deg,#0a1c33 0%,#161040 52%,#26103e 100%)} }

  /* ---------- the hard ones (ethics tab) ----------
     hidden behind a switch, because a poster should not ambush you with an atrocity. shown,
     they carry a red border and a ⚠ — the point is never that these were aberrations. */
  #hardwrap:empty{display:none}
  .hardbar{display:flex;align-items:center;gap:13px;max-width:640px;margin:18px auto 0;padding:11px 15px;border-radius:14px;
    border:1.5px dashed color-mix(in srgb,#c92a2a 45%,transparent);background:color-mix(in srgb,#c92a2a 7%,transparent);text-align:left}
  :root[data-hard="on"] .hardbar{border-style:solid;background:color-mix(in srgb,#c92a2a 13%,transparent)}
  .hardsw{flex:none;width:44px;height:24px;padding:0;border-radius:999px;cursor:pointer;position:relative;
    border:1.5px solid color-mix(in srgb,#c92a2a 50%,transparent);background:color-mix(in srgb,#c92a2a 12%,var(--panel));transition:background .25s}
  :root[data-hard="on"] .hardsw{background:#c92a2a;border-color:#c92a2a}
  .hardsw .knob{position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;background:var(--panel);
    box-shadow:0 2px 6px rgba(10,6,20,.4);transition:transform .25s cubic-bezier(.2,.7,.2,1)}
  :root[data-hard="on"] .hardsw .knob{transform:translateX(20px);background:#fff}
  .hardtxt{font-size:11.5px;color:var(--muted);line-height:1.45}
  .hardtxt b{color:#c92a2a;font-weight:800;letter-spacing:.02em}
  :root[data-theme="dark"] .hardtxt b{color:#ff8080}
  @media (prefers-color-scheme:dark){ :root:not([data-theme="light"]) .hardtxt b{color:#ff8080} }
  .hardtxt em{display:block;font-style:normal;opacity:.85;margin-top:2px}
  .mech.hard{display:none}
  :root[data-hard="on"] .mech.hard{display:flex;animation:pop .45s cubic-bezier(.2,.7,.2,1) both}
  @media (prefers-reduced-motion:reduce){ :root[data-hard="on"] .mech.hard{animation:none} }
  .mech.hard .disc{border-color:#c92a2a;border-width:2.5px;filter:saturate(.45);
    box-shadow:0 7px 20px color-mix(in srgb,#c92a2a 34%,transparent),inset 0 0 0 1px rgba(255,255,255,.25)}
  .mech.hard:hover .disc,.mech.hard:focus-visible .disc,.mech.hard.pinned .disc{filter:saturate(.7);
    box-shadow:0 18px 48px color-mix(in srgb,#c92a2a 55%,transparent),0 0 0 3px #c92a2a,0 0 26px color-mix(in srgb,#c92a2a 45%,transparent)}
  .mech.hard .nm{color:#c92a2a}
  :root[data-theme="dark"] .mech.hard .nm{color:#ff8080}
  @media (prefers-color-scheme:dark){ :root:not([data-theme="light"]) .mech.hard .nm{color:#ff8080} }
  .mech.hard .nm::after{content:" ⚠"}

  #spiralwrap{display:none;position:relative;z-index:1;margin:6px auto 0;max-width:1240px}
  /* the coil, and its apparatus, side by side */
  /* ---- the scrollytell: the coil sticks, the story scrolls past it, and the story drives it ---- */
  .spscroll{display:flex;gap:30px;align-items:flex-start}
  .spsticky{position:sticky;top:12px;flex:1 1 auto;min-width:0;align-self:flex-start}
  .spsticky #spiralsvg{width:100%;max-height:70vh}
  /* both legends live under the coil, stacked — and they are styled as two different KINDS of
     thing, because they are. the cargo floats: round pills, round swatches, lifted off the page,
     no frame around them. the container is a rack: a bordered, tinted panel of square-cornered
     tiles, each with a rope-coloured bar down its left edge. you should be able to tell which
     legend you are looking at with the text blurred out. */
  .spsticky .splegend{margin:12px auto 0;max-width:100%;gap:6px}
  .spsticky .splegend.caps{margin-top:4px;gap:7px}
  .leglab{flex-basis:100%;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:850;margin-bottom:3px}
  .leglab em{font-style:normal;font-weight:500;text-transform:none;letter-spacing:.02em;color:var(--muted)}

  /* --- what travels: cargo. buoyant, round, unframed --- */
  .caps .leglab{text-align:center;
    background:linear-gradient(90deg,#2f9e44,#a17a00,#e03131,#b535bb,#1c7ed6);
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .caps .leglab::before{content:"▲ "}
  .caps .leglab em{-webkit-text-fill-color:var(--muted)}
  .spsticky .splegend.caps .spchip{border-radius:999px;font-size:11.5px;padding:5px 12px 5px 7px;font-weight:700;
    background:color-mix(in srgb,var(--sc) 12%,var(--panel));border-color:color-mix(in srgb,var(--sc) 40%,transparent);
    box-shadow:0 3px 10px color-mix(in srgb,var(--sc) 22%,transparent)}
  .spsticky .splegend.caps .spchip .swatch{border-radius:50%;width:9px;height:9px;
    box-shadow:0 0 0 3px color-mix(in srgb,var(--sc) 22%,transparent)}
  .spsticky .splegend.caps .spchip:hover{transform:translateY(-3px)}

  /* --- what carries it: the container. a rack, framed, squared off --- */
  .spsticky .splegend.strands{margin-top:14px;padding:11px 12px 12px;border-radius:12px;
    border:1px solid color-mix(in srgb,var(--ink) 15%,transparent);
    background:color-mix(in srgb,var(--ink) 3.5%,transparent);gap:5px}
  .strands .leglab{text-align:left;color:var(--muted);display:flex;align-items:center;gap:8px}
  .strands .leglab::after{content:"";flex:1;height:1px;background:color-mix(in srgb,var(--ink) 14%,transparent)}
  .spsticky .splegend.strands .spchip{border-radius:5px;font-size:11px;padding:4px 9px 4px 0;font-weight:650;
    background:var(--panel);border-color:color-mix(in srgb,var(--ink) 12%,transparent);box-shadow:none;overflow:hidden}
  .spsticky .splegend.strands .spchip .swatch{width:4px;height:22px;border-radius:0;margin-right:2px}
  .spsticky .splegend.strands .spchip:hover,.spsticky .splegend.strands .spchip:focus-visible{
    transform:none;background:color-mix(in srgb,var(--sc) 11%,var(--panel));
    border-color:color-mix(in srgb,var(--sc) 55%,transparent);box-shadow:none}
  .spsticky .spchip .word{font-size:10.5px}
  .spsteps{flex:0 0 370px;padding:8vh 0 14vh}
  .spstep{min-height:74vh;display:flex;flex-direction:column;justify-content:center;
    opacity:.3;filter:blur(.6px);transition:opacity .5s,filter .5s,transform .5s;transform:translateY(10px)}
  .spstep.on{opacity:1;filter:none;transform:none}
  .spstep .stepn{font:800 11px/1 ui-monospace,"SF Mono",Menlo,monospace;letter-spacing:.2em;color:var(--muted);opacity:.6}
  .spstep h3{margin:9px 0 10px;font-size:20px;font-weight:840;letter-spacing:.01em;color:var(--ink);line-height:1.2}
  .spstep.on h3{background:linear-gradient(90deg,#2f9e44,#b535bb,#1c7ed6);-webkit-background-clip:text;background-clip:text;color:transparent}
  .spstep p{margin:0;font-size:13px;line-height:1.68;color:var(--muted)}
  .spstep p b{color:var(--ink);font-weight:700}
  .spstep p em{font-style:italic;color:var(--ink);opacity:.85}
  /* the five phases, inside step 00 — same chips, but now they belong to a paragraph that says
     what they are, instead of floating above the story with a label on them */
  .spstep .loop{margin-top:16px;justify-content:flex-start}
  .spstep.intro .loop i{cursor:help}
  .spstep.on .loop i{border-color:color-mix(in srgb,var(--ink) 22%,transparent)}
  .spbtns{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
  .spbtns .playbtn{margin-top:0}
  .spbtns .playbtn.decaybtn{margin-left:0}
  .spbelow{margin:22px auto 0}
  @media(max-width:900px){                      /* narrow: no sticky, no theatre — just read it */
    .spscroll{flex-direction:column}
    .spsticky{position:static;width:100%}
    .spsticky #spiralsvg{max-height:none}
    .spsteps{flex:1 1 auto;width:100%;padding:0}
    .spstep{min-height:0;opacity:1;filter:none;transform:none;margin-bottom:24px}
    .spsteps .looprow{justify-content:center;margin-bottom:18px}
  }
  @media (prefers-reduced-motion:reduce){ .spstep{opacity:1;filter:none;transform:none;transition:none} }

  /* ---- what each step does to the coil ---- */
  /* every one of these is a VARIABLE push, never a filter/opacity redeclaration — see the note by
     --g above. break that rule and you break the buttons. */
  /* 01 · the rope fattens: swell it, saturate it, and let the breathing read */
  .spsticky[data-act="rope"]{--as:.7;--az:.03}
  /* 02 · the clusters: rope drops back so the swarms are all you can see */
  .spsticky[data-act="cluster"]{--ao:.30}
  .spsticky[data-act="cluster"] .caphalo{opacity:.34 !important}
  /* 03 · the range: the flank counts up, one era at a time */
  .spsticky[data-act="range"]{--ao:.34;--bo:.22}
  .spsticky[data-act="range"] .sp-eralab,.spsticky[data-act="range"] .sp-erasub{
    animation:rangepop .5s cubic-bezier(.2,.7,.2,1) both;animation-delay:calc(var(--i,0)*.28s)}
  .spsticky[data-act="range"] .sp-erasub{fill:var(--ink);font-weight:700}
  @keyframes rangepop{from{opacity:.25;transform:translateX(-14px)}to{opacity:1;transform:none}}
  /* 04 · the fog: everything below drops away, the mist thickens, the forks draw themselves */
  .spsticky[data-act="fog"]{--ao:.22;--bo:.14}
  .spsticky[data-act="fog"] .sp-eralab,.spsticky[data-act="fog"] .sp-erasub{opacity:.2}
  .spsticky[data-act="fog"] .sp-mist{opacity:.13;filter:blur(30px)}
  .spsticky[data-act="fog"] .sp-fork{stroke-dasharray:2400;stroke-dashoffset:2400;
    animation:forkdraw 1.5s cubic-bezier(.3,.6,.2,1) forwards}
  .spsticky[data-act="fog"] .sp-fork.dead{animation-delay:.15s}
  .spsticky[data-act="fog"] .sp-fork.live{animation-delay:.5s}
  @keyframes forkdraw{to{stroke-dashoffset:0}}
  .spsticky[data-act="fog"] .sp-forklab,.spsticky[data-act="fog"] .sp-forkend{
    animation:fadein .7s 1.5s both}
  @keyframes fadein{from{opacity:0}}
  .spsticky[data-act="fog"] .sp-phase.mistlab{opacity:.9}
  /* 05 · go and break it: the things you can touch come forward */
  .spsticky[data-act="play"] .splegend.caps .spchip{animation:chipwink 2.6s ease-in-out infinite;
    animation-delay:calc(var(--k,0)*.09s)}
  @keyframes chipwink{50%{transform:translateY(-2px);box-shadow:0 6px 16px color-mix(in srgb,var(--sc) 40%,transparent)}}
  .spsticky .ropelayer,.spsticky .beadlayer,.spsticky #spcaps,.spsticky .sp-mist,
  .spsticky .sp-eralab,.spsticky .sp-erasub,.spsticky #spiralsvg{transition:opacity .6s,filter .6s,transform .6s,fill .6s}
  @media (prefers-reduced-motion:reduce){
    .spsticky[data-act] .sp-fork,.spsticky[data-act] .sp-forklab,.spsticky[data-act] .sp-forkend,
    .spsticky[data-act] .sp-eralab,.spsticky[data-act] .sp-erasub,
    .spsticky[data-act="play"] .splegend.caps .spchip{animation:none}
  }
  /* ---- where we're headed: the fog at the top, and the two ways out of it ---- */
  .sp-mist{fill:var(--ink);opacity:.05;filter:blur(26px);pointer-events:none}
  .sp-fork{fill:none;stroke-linecap:round;pointer-events:none}
  /* the one that comes apart: thinning, greying, dashed out of existence */
  .sp-fork.dead{stroke:var(--muted);stroke-width:3.4;opacity:.55;stroke-dasharray:7 10}
  /* the one that keeps going: full colour, still breathing */
  .sp-fork.live{stroke:#b535bb;stroke-width:5;opacity:.72;
    filter:drop-shadow(0 0 7px rgba(181,53,187,.55));animation:forkpulse 3.4s ease-in-out infinite}
  @keyframes forkpulse{50%{opacity:1;stroke-width:6.4}}
  .sp-forkend{pointer-events:none}
  .sp-forkend.dead{fill:none;stroke:var(--muted);stroke-width:2;opacity:.4;stroke-dasharray:2 3}
  .sp-forkend.live{fill:#b535bb;opacity:.9;filter:drop-shadow(0 0 9px rgba(181,53,187,.8));
    animation:forkpulse 3.4s ease-in-out infinite}
  @media (prefers-reduced-motion:reduce){ .sp-fork.live,.sp-forkend.live{animation:none} }
  .sp-phase.mistlab{opacity:.5;letter-spacing:.22em}
  .sp-forklab{font:700 19px/1 ui-monospace,"SF Mono",Menlo,monospace;
    paint-order:stroke;stroke:var(--panel);stroke-width:4px;stroke-linejoin:round}
  .sp-forklab.dead{fill:var(--muted);opacity:.7}
  .sp-forklab.live{fill:#b535bb}
  :root[data-theme="dark"] .sp-forklab.live,:root[data-theme="dark"] .sp-fork.live{stroke:#cc5cd0}
  :root[data-theme="dark"] .sp-forklab.live{fill:#cc5cd0;stroke:var(--panel)}
  :root[data-mode="spiral"] #spiralwrap{display:block}
  #spiralwrap svg{width:100%;height:auto;display:block;overflow:visible}
  /* the coil climbs out of 10,000 bce. it fails visible: if the animation never runs
     (reduced motion, no support), the un-clipped default is the finished picture. */
  @keyframes spwipe{from{clip-path:inset(100% 0 0 0)} to{clip-path:inset(0 0 0 0)}}
  #spiralsvg .reveal{animation:spwipe 2.4s cubic-bezier(.2,.7,.2,1) .1s both}
  @media (prefers-reduced-motion:reduce){ #spiralsvg .reveal{animation:none} }
  /* structure: one guide ellipse per turn, the five phases of the loop, the labels */
  .sp-guide{fill:none;stroke:var(--ink);stroke-width:1;opacity:.10}
  .sp-guide.ghost{stroke-dasharray:3 8;opacity:.22}
  .sp-spoke{stroke:var(--ink);stroke-width:1;opacity:.13;stroke-dasharray:2 4}
  /* the coil is the whole page now, so its labels are read at arm's length, not squinted at:
     everything in the svg runs at ~2x what it did when the lede was carrying the argument. */
  .sp-phase{font:800 24px/1 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:.13em;text-transform:uppercase;fill:var(--ink);opacity:.72}
  .sp-phasesub{font:500 19px/1 ui-monospace,"SF Mono",Menlo,monospace;fill:var(--muted)}
  .sp-eralab{font:800 23px/1 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:var(--ink);letter-spacing:.03em}
  .sp-erasub{font:500 19px/1 ui-monospace,"SF Mono",Menlo,monospace;fill:var(--muted)}
  .sp-core{font:800 21px/1 -apple-system,sans-serif;fill:var(--muted);letter-spacing:.05em}
  /* the ten strands */
  .strand{cursor:pointer;transition:opacity .22s}
  .strand .rope{fill:var(--sc)}
  .strand .rope path{stroke:none}
  .strand .node{fill:var(--sc);stroke:var(--panel);stroke-width:1.5;transition:transform .18s;transform-box:fill-box;transform-origin:center}
  .strand .node:hover{transform:scale(1.5)}
  .strand .ghostnode{fill:none;stroke:var(--sc);stroke-width:2;stroke-dasharray:3 4;opacity:.6}
  #spiralsvg.focusing .strand{opacity:.14}
  #spiralsvg.focusing .strand.foc{opacity:1}
  #spiralsvg.focusing .strand.foc .rope{opacity:1}
  /* legend: identity is never color-alone — every strand carries its emoji + name */
  .splegend{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;max-width:860px;margin:18px auto 0}
  .spchip{display:flex;align-items:center;gap:6px;font:inherit;font-size:12px;font-weight:650;color:var(--ink);
    background:color-mix(in srgb,var(--panel) 62%,transparent);border:1px solid var(--line);border-radius:999px;
    padding:5px 11px 5px 7px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .18s,box-shadow .18s}
  .spchip .swatch{width:11px;height:11px;border-radius:3px;background:var(--sc);flex:none}
  .spchip:hover,.spchip:focus-visible{transform:translateY(-2px);box-shadow:0 6px 18px color-mix(in srgb,var(--sc) 35%,transparent)}
  .spchip .word{color:var(--muted);font-weight:500}
  .spchip.cap .swatch{border-radius:50%}
  .splegend.caps{margin-top:9px;opacity:.92}
  /* the rope is drawn by a shaky hand: fractal noise displaces the ink, and the displacement
     itself drifts, so no two seconds of the coil are identical. beads and labels are NOT in
     this layer — a target that wanders out from under the cursor is a bug, not a texture. */
  /* --g is the build level, 0→1. it swells the coil, saturates the ink, and lights it from
     inside — then bleeds away on its own. you can build the spiral; you cannot bank it. */
  /* --d is the mirror of --g: the colour drains out, the glow dies, the whole coil goes grey
     and slumps. it cools off at exactly the same rate a build does. */
  /* the scrollytell's steps must NOT redeclare these filters — they'd win on specificity and the
     two buttons would go dead: you'd click build and nothing on the coil would move. so the steps
     only ever push their own variables (--as saturation, --ao rope opacity, --bo bead opacity,
     --az scale) INTO the same expressions --g and --d already live in. one pipeline, two hands
     on it: the reader's scroll position and the reader's clicks. */
  #spiralwrap{--g:0;--d:0}
  .spsticky,#spiralwrap{--as:0;--ao:1;--bo:1;--az:0}
  .ropelayer{filter:url(#sphand) saturate(calc(1 + var(--g)*0.8 - var(--d)*0.8 + var(--as)))
             grayscale(calc(var(--d)*0.65))
             drop-shadow(0 0 calc(var(--g)*9px + var(--as)*10px) rgba(124,92,255,.42));
             opacity:calc((0.86 + var(--g)*0.14 - var(--d)*0.44) * var(--ao));
             transition:opacity .6s,filter .6s}
  .beadlayer,#spcaps{opacity:calc((1 - var(--d)*0.5) * var(--bo));transition:opacity .6s}
  @media (prefers-reduced-motion:reduce){
    .ropelayer{filter:saturate(calc(1 + var(--g)*0.8 - var(--d)*0.8 + var(--as))) grayscale(calc(var(--d)*0.65))}
  }
  /* the capital, climbing — in clusters that thrive, come apart, and start again */
  .captok{stroke:var(--panel);stroke-width:1.2;pointer-events:none}
  .captail{fill:none;stroke-width:2.2;stroke-linecap:round;pointer-events:none}
  .caphalo{pointer-events:none}                 /* how well a cluster is doing, made visible */
  .cluhalos,.clutails{pointer-events:none}
  .caphit{fill:transparent;cursor:pointer}
  .capg.holding .captok{stroke:var(--ink);stroke-width:1.8}
  /* hover a form of capital in the legend and every token of it lights up across every cluster.
     !important because the opacity of a token is set per-frame as an attribute by the raf loop —
     a stylesheet rule of ordinary weight loses to it, and the highlight silently does nothing. */
  #spcaps.focusing .capg{opacity:.10 !important}
  #spcaps.focusing .capg.foc{opacity:1 !important}
  #spcaps.focusing .capg.foc .captok{stroke:var(--ink);stroke-width:1.7;
    filter:drop-shadow(0 0 7px var(--kc)) drop-shadow(0 0 14px var(--kc))}
  #spcaps.focusing .caphalo,#spcaps.focusing .captail{opacity:.05 !important}
  .spchip.cap.lit{transform:translateY(-2px);box-shadow:0 6px 18px color-mix(in srgb,var(--sc) 45%,transparent);
    border-color:color-mix(in srgb,var(--sc) 60%,transparent)}
  /* the coil swells when built and shrinks + slumps when it is left to rot */
  #spiralsvg{transition:transform .5s cubic-bezier(.2,.7,.2,1);
    transform:scale(calc(1 + var(--g)*0.04 - var(--d)*0.05 + var(--az))) translateY(calc(var(--d)*16px))}
  #spiralsvg.stirred{transform:scale(calc(1.018 + var(--g)*0.04 - var(--d)*0.05 + var(--az))) translateY(calc(var(--d)*16px))}
  @media (prefers-reduced-motion:reduce){ #spiralsvg,#spiralsvg.stirred{transform:none} }
  /* the two buttons: one builds it, one lets it rot. only the spiral has them. */
  /* NOTE the selector weight: :root[data-mode="spiral"] .playbtn paints every button in the
     spiral's own gradient, and it outranks a bare .decaybtn — so this one has to match at the
     same depth or the "dark grey" button comes out neon green. */
  .decaybtn{display:none}
  :root[data-mode="spiral"] .playbtn.decaybtn{display:inline-flex;align-items:center;gap:9px;
    margin-left:10px;background:linear-gradient(90deg,#24262a,#34373d);
    color:#b9bcc2;box-shadow:0 8px 26px rgba(15,16,18,.45)}
  :root[data-mode="spiral"] .playbtn.decaybtn:hover{box-shadow:0 14px 34px rgba(15,16,18,.62)}
  .playbtn.build{display:inline-flex;align-items:center;gap:9px}
  .playbtn .pips{font-size:10px;letter-spacing:2px;opacity:.75}
  @keyframes maxshake{0%,100%{transform:translateY(-2px)}25%{transform:translateY(-2px) translateX(-3px)}75%{transform:translateY(-2px) translateX(3px)}}
  .playbtn.maxed{animation:maxshake .38s}
  @media (prefers-reduced-motion:reduce){ .playbtn.maxed{animation:none} }
  /* the lede, for the spiral: the claim, and what it costs you to believe it. that is all. */
  .lede.spiralede{max-width:none;display:flex;flex-direction:column;align-items:center;gap:9px;font-size:13.5px}
  .lede.spiralede>b{color:var(--ink);font-size:15px;letter-spacing:.01em}
  .lede.spiralede .lsub{max-width:60ch;line-height:1.6}
  .lede.spiralede .lsub b{color:var(--ink);font-weight:700}
  /* the five phases, rehomed: down by the coil, beside the thing they label */
  .looprow{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:9px;margin:20px auto 0}
  .looplab{font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .loop{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:7px}
  .loop i{font-style:normal;font-weight:750;font-size:11px;letter-spacing:.09em;text-transform:uppercase;
    color:var(--ink);background:color-mix(in srgb,var(--panel) 70%,transparent);
    border:1px solid var(--line);border-radius:999px;padding:4px 11px;cursor:help}
  .loop u{text-decoration:none;color:var(--muted);opacity:.6;font-size:12px}
  .spnote{font-size:11.5px;color:var(--muted);font-style:italic;text-align:center;margin:16px auto 0;max-width:620px;line-height:1.6}
  @media(max-width:640px){ .sp-statsub,.sp-scale,.sp-eralab,.sp-herelab{display:none} .sp-stat{font-size:19px} }
</style>
</head>
<body>
<div class="page">

  </div>
  <!-- the nav lives OUTSIDE the frame, underneath it: the poster is the object, and the tabs are
       the hand reaching in to turn it over. they are apparatus, not artwork — so they sit off the
       print, below the mount, where the label card would go. -->

// history is not a machine part. a perfect helix — every turn an exact scaled copy of the
// last — reads as a spring, and a spring is a lie: it says the same thing happened five
// times at different sizes. so the curve carries noise. deterministic noise (hashed, not
// Math.random), because the shape must survive a re-render on theme change unchanged.
const spHash=n=>{ const s=Math.sin(n*127.1+311.7)*43758.5453; return s-Math.floor(s); };

// ---- the drawdowns: where the downward forces win ----
// the coil does not climb smoothly, and its setbacks are not all the same size. they are
// power-law distributed — the way collapses actually are. dozens of small reversals you have
// never heard of, a handful of medium ones, and every so often something that takes a
// civilization down with it. the big ones are RARE, not absent: that is the whole shape of
// the risk, and a curve that dips politely once per turn is lying about it.
//

// itself when you flip the theme.

      const [r1,y1]=spFil(i,u), [r2,y2]=spFil(i,u2);
      const [ax,ay]=spPt(u,r1-w1,y1), [bx2,by2]=spPt(u,r1+w1,y1);
      const [cx2,cy2]=spPt(u2,r2+w2,y2), [dx,dy]=spPt(u2,r2-w2,y2);
      const op=(0.30+0.70*spDepth(u+STEP/2))*(fut?0.28:1);
      segs+=`<path d="M${ax.toFixed(1)} ${ay.toFixed(1)}L${bx2.toFixed(1)} ${by2.toFixed(1)}L${cx2.toFixed(1)} ${cy2.toFixed(1)}L${dx.toFixed(1)} ${dy.toFixed(1)}Z" opacity="${op.toFixed(2)}"/>`;
    }
    // a bead where each era's loop begins, sized by how many mechanisms that era holds
    let bd='';
    TURNS.forEach((T,u)=>{
      const n=M.eras[u].mechs.length, [ro,yo]=spFil(i,u), [x,y]=spPt(u,ro,yo);
      bd+=`<circle class="node" cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${(2.8+Math.sqrt(n)*0.62).toFixed(1)}"
        data-s="${i}" data-e="${u}" tabindex="0" role="button" aria-label="${s.label} in the ${T.era} era: ${s.w[u]}"/>`;
    });
    const [gro,gyo]=spFil(i,6), [fx,fy]=spPt(6,gro,gyo);
    bd+=`<circle class="ghostnode" cx="${fx.toFixed(1)}" cy="${fy.toFixed(1)}" r="4.5"/>`;
    // ropes and beads live in separate layers: the hand-drawn filter displaces the rope, and
    // a bead you are trying to click must not wander off under the cursor. both layers carry
    // .strand + data-s, so hover-focus still lights the whole lineage at once.
    rope+=`<g class="strand" data-s="${i}" data-mode="${s.mode}" style="--sc:${col(s)}"><g class="rope">${segs}</g></g>`;
    beads+=`<g class="strand" data-s="${i}" data-mode="${s.mode}" style="--sc:${col(s)}">${bd}</g>`;
  });

  // the hand-drawn filter: fractal noise displacing the ink, with the displacement itself
  // drifting — so the rope is never quite still, the way a drawn line is never quite straight.
  // one filter over the whole rope layer, not ten: ten full-canvas filter regions is a
  // real cost on a phone, and the strands already differ from each other geometrically.
  const defs=`<defs>
      <filter id="sphand" x="-18%" y="-10%" width="136%" height="120%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.026" numOctaves="3" seed="7" result="n"/>
        <feDisplacementMap in="SourceGraphic" in2="n" scale="11" id="sphandmap">
          <animate attributeName="scale" values="8;15;7;13;8" keyTimes="0;0.28;0.55;0.8;1" dur="19s" repeatCount="indefinite"/>
        </feDisplacementMap>
      </filter>
    </defs>`;
  // the coil wanders now, and the era labels hang off its left flank — the old 0..1040 box
  // guillotined both. give it air on all four sides.
  // the coil and its apparatus sit side by side: the legend for what is climbing, and the note
  // explaining the shape, belong NEXT to the shape — not stacked underneath it where you have to
  // hold the picture in your head while you read about it.
  // the coil and the ONE legend it needs sit side by side. everything that is prose — the loop,
  // the lineages, the explanation — moves below the picture: you should meet the shape first and
  // be told about it second.
  // the prose was a wall: five identical grey paragraphs, 800px below the picture each one was
  // ABOUT. so the coil goes sticky and the paragraphs scroll past it — and each one DRIVES the
  // thing it describes. "the rope fattens" swells the rope. "they come apart" kills a cluster on
  // cue. "the numbers are range" counts the flank up, one era at a time. "the top is fog" rolls
  // the fog in and draws the two forks. the text stops being a caption that lost its picture.
  const STEPS=[
    {act:'rope', h:'it breathes once an era',
     p:`one turn per era, and every turn ends wider and higher than it began, because the range keeps growing.
        the rope <b>fattens where leaving is expensive</b> and thins where you are free — so it breathes, once an era.
        the coil sags just before each fork: that is the downward part, and it is built into the upward one. it is also
        pocked with drawdowns where the downward forces simply won, and those are <b>power-law sized</b> — dozens you
        have never heard of, a handful that took the range down with them. the big ones are rare, not absent.`},
    {act:'cluster', h:'capital never travels alone',
     p:`the swarms climbing it are the capital, and each <b>cluster</b> is several forms of it bound together and
        coevolving — a civilization, a boom, a scene. watch one long enough and it comes apart. they strain hardest
        exactly where exit gets dear, and there most of them break: a fall, a scatter, a dimming — and then a new
        cluster seeds at the start of the next turn and begins climbing. <b>that is the fork, and it is the only reason
        the coil gets anywhere.</b> <em>watch — one is about to go.</em>`},
    {act:'range', h:'the numbers are range',
     p:`the numbers down the left flank are <b>range</b>: the most people a single coordination system could hold
        together at once. <b>~150</b> in the band. <b>~10⁶</b> once you have grain and a god. <b>~10⁸</b> with a state.
        <b>~10⁹</b> with a platform. about an order of magnitude a turn — and that growth is the only thing this whole
        picture is actually claiming.`},
    {act:'fog', h:'the top is fog on purpose',
     p:`the five phases are a pattern we noticed in the <em>past</em>. they are not a map of what comes next, so we do
        not get to label the turn we have not taken. up there you get fog, and two ways out of it —
        <b>one comes apart, one keeps going</b> — drawn with equal confidence, because nobody knows which.`},
    {act:'play', h:'make it or break it', btns:1,
     p:`hover a form of capital to find it in every cluster. hover a strand to follow one question through all five eras.
        click a bead to open that era. <b>tap the coil to stir it.</b> and take a hand yourself: <b>build</b> feeds the
        clusters — faster, fatter, likelier to survive the capture phase — while <b>status quo</b> starves them.
        <b>neither of you gets to keep the picture you made</b>: both wear off in seven seconds.`}
  ];
  wrap.innerHTML=`<div class="spscroll">
    <div class="spsticky">
      <svg id="spiralsvg" viewBox="-430 -34 1700 1310" role="img"
        aria-label="${STRANDS.length} lineages of history coiling upward through five eras, each turn wider than the last, ending in a fog with two forks: one that comes apart and one that keeps going. ${CAPITALS.length} forms of capital climb the coil in clusters that thrive, collapse and re-seed.">
        ${defs}
        <g class="reveal">${frame}<g class="ropelayer">${rope}</g><g class="beadlayer">${beads}</g><g id="spcaps"></g>${lab}</g>
      </svg>
      <!-- two legends, one under the other, and the order is the argument: the capital TRAVELS,
           the strands CONTAIN. the rope is the container; the swarms on it are the cargo. -->
      <div class="splegend caps"><span class="leglab">what travels <em>· the cargo, climbing</em></span>${CAPITALS.map((k,i)=>`
        <button class="spchip cap" data-k="${i}" style="--sc:${dark?k.d:k.c};--k:${i}"><span class="swatch"></span>${k.em} ${k.n} capital</button>`).join('')}</div>
      <div class="splegend strands"><span class="leglab">what carries it <em>· the container — ${STRANDS.length} strands, braided into the rope</em></span>${STRANDS.map((s,i)=>`
        <button class="spchip" data-s="${i}" style="--sc:${col(s)}"><span class="swatch"></span>${s.em} ${s.name} <span class="word">— ${s.label}</span></button>`).join('')}</div>
    </div>
    <div class="spsteps">
      <!-- step 00. the loop used to sit up here as a bare chip row with a label, in a completely
           different visual language from the five steps under it — so it read as leftover apparatus
           rather than as the first thing you are supposed to understand. it is now the opening beat,
           and it asks you the question the rest of the page is trying to answer. -->
      <section class="spstep intro" data-act="loop">
        <span class="stepn">00</span>
        <h3>history only knows one move</h3>
        <p>it goes like this. something new turns up, and at the start it is small, open, and <b>easy to walk away
          from</b>. then it gets rules, and roles, and people whose whole job is the rules. then it <em>wins</em> — and
          it is suddenly holding ten times as many people as it did. then the gatekeepers arrive, and leaving stops
          being free. and then somebody leaves anyway, and takes a piece of it with them.
          <br><br>and then it happens again.
          <br><br>the band did this. the church did this. the state did this. the platform is doing it to you right
          now. <b>five turns, twelve thousand years, one move</b> — that is the coil on your left, and everything else
          on this page is the evidence.
          <br><br><b>so which beat are you standing in?</b> nobody has ever been able to tell from the inside — not
          once, not in any of the five. that is the honest answer, and it is exactly why the top of the coil is fog.</p>
        <div class="loop">${PHASES.map(p=>`<i title="${p.s}">${p.t}</i>`).join('<u>→</u>')}</div>
      </section>
      ${STEPS.map((s,i)=>`<section class="spstep" data-act="${s.act}">
        <span class="stepn">${String(i+1).padStart(2,'0')}</span>
        <h3>${s.h}</h3><p>${s.p}</p>
        ${s.btns?'<div class="spbtns"></div>':''}
      </section>`).join('')}
    </div>
  </div>`;

  const svg=document.getElementById('spiralsvg');
  const focus=i=>{ svg.classList.add('focusing');
    svg.querySelectorAll('.strand').forEach(el=>el.classList.toggle('foc',+el.dataset.s===i)); };
  const blur=()=>{ svg.classList.remove('focusing');
    svg.querySelectorAll('.strand.foc').forEach(el=>el.classList.remove('foc')); };

  svg.querySelectorAll('.strand').forEach(el=>{
    el.addEventListener('pointerenter',()=>focus(+el.dataset.s));
    el.addEventListener('pointerleave',blur);
  });
  wrap.querySelectorAll('.spchip[data-s]').forEach(b=>{
    const i=+b.dataset.s;
    b.addEventListener('pointerenter',()=>focus(i));
    b.addEventListener('pointerleave',blur);
    b.addEventListener('focus',()=>focus(i));
    b.addEventListener('blur',blur);
    b.addEventListener('click',e=>{ e.stopPropagation(); zing(hashName(STRANDS[i].mode),3); setMode(STRANDS[i].mode,true); });
  });
  svg.querySelectorAll('.node').forEach(el=>{
    const s=STRANDS[+el.dataset.s], e=+el.dataset.e;
    const show=(px,py)=>{ fillSpiralTip(s,e); tt.classList.add('on'); placeTip(px,py); };
    el.addEventListener('pointerenter',ev=>show(ev.clientX,ev.clientY));
    el.addEventListener('pointermove',ev=>placeTip(ev.clientX,ev.clientY));
    el.addEventListener('pointerleave',()=>tt.classList.remove('on'));
    el.addEventListener('focus',()=>{ const r=el.getBoundingClientRect(); show(r.right,r.top); });
    el.addEventListener('blur',()=>tt.classList.remove('on'));
    el.addEventListener('click',ev=>{
      ev.stopPropagation(); burst(el,bumpCombo()); zing(hashName(s.mode+e),3);
      setMode(s.mode,true);
      setTimeout(()=>document.querySelectorAll('.era')[e]?.scrollIntoView({behavior:'smooth',block:'center'}),260);
    });
  });

  // ---- the capital, climbing — in clusters ----
  // one bead per form of capital was a lie about how any of this moves. capital does not climb
  // alone; it climbs in CLUSTERS — a civilization, a boom, a scene — several forms of it bound
  // together and coevolving, holding each other up on the way round the turn.
  //
  // and clusters do not climb forever. each one strains hardest exactly where exit gets
  // expensive (the capture phase), and there most of them come apart: a brief fall, a scatter,
  // a dimming — and then the survivors seed a NEW cluster just below where the last one died,
  // and that one starts climbing. the fork is not an interruption of the picture. it IS the
  // picture, and it is the only reason the coil ever gets anywhere.
  //
  // the two buttons are the two hands on this: build feeds a cluster (faster, fatter, likelier
  // to survive the capture phase) and status quo starves it (slower, greyer, likelier to come
  // apart). neither of them sticks. both wear off in seven seconds.
  const capg=svg.querySelector('#spcaps');
  const CLU_N=5, MEM_MAX=5, POOL=CLU_N*MEM_MAX;
  // a fixed pool of token nodes, re-dealt to whichever cluster needs them each frame — a cluster
  // that dies must not leave orphan dom behind, and a newborn must not have to allocate.
  capg.innerHTML=
    `<g class="cluhalos">${Array.from({length:CLU_N},()=>'<circle class="caphalo" r="0"/>').join('')}</g>`+
    `<g class="clutails">${Array.from({length:CLU_N},()=>'<path class="captail"/>').join('')}</g>`+
    Array.from({length:POOL},()=>
      `<g class="capg" data-k="0"><path class="captok"/>
         <circle class="caphit" r="12" tabindex="0" role="button" aria-label="a form of capital, climbing the spiral"/>
       </g>`).join('');
  const halos=[...capg.querySelector('.cluhalos').children];
  const tails=[...capg.querySelector('.clutails').children];
  const pool =[...capg.querySelectorAll('.capg')];

  // a token: a rounded n-gon. n falls as it climbs — a soft blob down in the band, a hard
  // little crystal by the time the protocol is the thing holding it.
  function tokD(x,y,rad,n,rot){
    let d='';
    for(let j=0;j<n;j++){
      const a=rot+j*2*Math.PI/n;
      d+=(j?'L':'M')+(x+Math.cos(a)*rad).toFixed(1)+' '+(y+Math.sin(a)*rad).toFixed(1);
    }
    return d+'Z';
  }
  const rnd=(a,b)=>a+Math.random()*(b-a);
  // a new cluster: three to five forms of capital, bound together, starting where the last one
  // fell. it inherits nothing but its position, which is the most honest thing about it.
  function newCluster(u){
    const ks=[...CAPITALS.keys()].sort(()=>Math.random()-0.5).slice(0,3+Math.floor(Math.random()*3));
    return {u, state:'rise', vit:rnd(0.5,0.8), fade:0, fallT:0,
      mem:ks.map(k=>({k, ang:rnd(0,6.283), spin:rnd(0.5,1.4)*(Math.random()<0.5?-1:1), rr:rnd(9,20)}))};
  }
  const clus=Array.from({length:CLU_N},(_,i)=>{ const c=newCluster(i*1.15); c.fade=1; return c; });

  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  let held=-1;                                        // the cluster the cursor is holding still
  let focK=-1;                                        // the capital form the legend is lighting up

  function drawClusters(dt){
    // the status quo does not stop the capital. it just makes everything wade.
    const drag=Math.max(0.18,1-decay*0.16);
    let p=0;
    clus.forEach((c,ci)=>{
      const step=dt*0.085*spVel(c.u)*(1+energy*1.1)*(1+growth*0.20)*drag;
      const strain=spExit(c.u);                       // 0..1 — peaks at capture, where exit is dear
      if(c.state==='rise'){
        if(ci!==held){
          c.u+=step;
          // the buttons ARE the vitality: build feeds it, status quo starves it, and the capture
          // phase strains it regardless of what anybody does about it.
          c.vit=Math.max(0,Math.min(1.15,c.vit+dt*(0.20*growth-0.30*decay-0.10*strain+0.075)));
          // risk goes as the CUBE of the strain, so a cluster is nearly safe for most of the turn
          // and then, in the capture phase, is suddenly not. deaths bunch where exit gets dear —
          // which is the claim. a healthy cluster runs ~30s; five stimulus clicks roughly halve it.
          // NOTE the small coefficient: a cluster does not merely PASS the capture phase, it dwells
          // there — the coil slows exactly where exit is dear — so a risk that looks gentle per
          // second still lands on most of them eventually. tuned so a healthy cluster runs ~30s.
          const risk=dt*(0.003+0.065*strain*strain*strain)*(1+decay*0.6)/(1+growth*0.6)*(c.vit<0.25?2.5:1);
          if(c.vit<=0.02||Math.random()<risk){ c.state='fall'; c.fallT=0; }
        }
        c.fade=Math.min(1,c.fade+dt*2.4);
      } else {
        c.fallT+=dt;
        c.u=Math.max(0,c.u-step*0.75);                // the brief downward time
        c.fade=Math.max(0,1-c.fallT/1.2);
        // and then the successor. it does NOT restart where its parent died — it starts the next
        // turn, at adopt, where things are new and open and cheap to leave. that is the whole
        // claim of the poster: the fork does not send you back, it sends you round again, higher.
        // (it also has to be this way mechanically: re-seed a cluster inside the capture phase and
        // it dies again in three seconds, forever, and the coil turns into a strobe light.)
        if(c.fallT>1.3) Object.assign(c,newCluster((Math.floor(c.u)+1)%6));
      }
      if(c.u>=6) c.u-=6;

      const e=Math.max(0,Math.min(4,Math.floor(c.u)));
      const [cx,cy]=spPt(c.u,0,0), dep=spDepth(c.u), ex=spExit(c.u);
      const scatter=c.state==='fall' ? 1+c.fallT*2.6 : 1;

      // the halo is how well the cluster is doing: it swells while it thrives and blows apart
      // with it. a dying cluster is visible from across the room, which is the point.
      const H=halos[ci];
      H.dataset.state=c.state; H.dataset.vit=c.vit.toFixed(2); H.dataset.u=c.u.toFixed(2);
      H.setAttribute('cx',cx.toFixed(1)); H.setAttribute('cy',cy.toFixed(1));
      H.setAttribute('r',((17+ex*11)*(0.55+0.75*c.vit)*scatter).toFixed(1));
      H.setAttribute('fill',ERAC[e]);
      H.setAttribute('opacity',(0.15*c.fade*dep*(0.3+c.vit)).toFixed(3));

      let td='';                                      // its wake, so you can read direction
      for(let j=0;j<=7;j++){ const uu=Math.max(0,c.u-j*0.02), [tx,ty]=spPt(uu,0,0);
        td+=(j?'L':'M')+tx.toFixed(1)+' '+ty.toFixed(1); }
      tails[ci].setAttribute('d',td);
      tails[ci].setAttribute('stroke',ERAC[e]);
      tails[ci].setAttribute('opacity',(0.26*dep*c.fade).toFixed(2));

      c.mem.forEach(m=>{
        if(p>=pool.length) return;
        const g=pool[p++], k=CAPITALS[m.k];
        if(ci!==held) m.ang+=dt*0.55*m.spin*(1+energy*0.6);
        const rr=m.rr*scatter*(1+growth*0.05);
        const x=cx+Math.cos(m.ang)*rr, y=cy+Math.sin(m.ang)*rr*SQ*1.5;
        const rad=(3.2+ex*2.4)*(1+energy*0.05+growth*0.07)*(1-decay*0.06)*(0.62+0.48*c.vit);
        const n=Math.max(5,Math.round(20-3*c.u));     // blob → crystal, as the eras learn to enforce it
        const tok=g.children[0], hit=g.children[1];
        tok.setAttribute('d',tokD(x,y,rad,n,c.u*0.9));
        tok.setAttribute('fill',spMix(dark?k.d:k.c, ERAC[e], 0.38));
        hit.setAttribute('cx',x.toFixed(1)); hit.setAttribute('cy',y.toFixed(1));
        hit.setAttribute('r','12');
        g.setAttribute('opacity',((0.42+0.58*dep)*c.fade).toFixed(2));
        g.style.setProperty('--kc',dark?k.d:k.c);
        g.dataset.k=m.k; g.dataset.e=e; g.dataset.c=ci;
        // the legend lights the nodes. the pool is re-dealt every frame, so this has to be
        // recomputed every frame too — a class stamped once at hover time lands on the wrong token.
        g.classList.toggle('foc',focK===m.k);
      });
    });
    for(;p<pool.length;p++){                          // nodes no cluster needed this frame
      pool[p].setAttribute('opacity','0');
      pool[p].children[1].setAttribute('r','0');
      pool[p].classList.remove('foc');
    }
  }
  if(reduce) drawClusters(0);

  // one loop drives everything: the clusters climbing, the stir decaying, the build cooling.
  // --g is what the css hangs the glow and the swell off; it is growth, normalized.
  let last=performance.now();
  const step=now=>{
    const dt=Math.min((now-last)/1000,0.05); last=now;
    energy*=Math.pow(0.5,dt/0.7); if(energy<0.002) energy=0;
    if(growth>0){ growth=Math.max(0,growth-dt*GCOOL); paintBuild(); }
    if(decay>0){ decay=Math.max(0,decay-dt*GCOOL); paintDecay(); }
    if(!reduce) drawClusters(dt);
    spRAF=requestAnimationFrame(step);
  };
  spRAF=requestAnimationFrame(step);
  paintBuild();

  // tap to stir: the storm gets faster and fatter for a moment, then settles. history does
  // not stay stirred.
  svg.addEventListener('pointerdown',()=>{ energy=Math.min(energy+1.7,7); svg.classList.add('stirred');
    clearTimeout(svg._st); svg._st=setTimeout(()=>svg.classList.remove('stirred'),620); });

  // hovering a token freezes its WHOLE cluster — you cannot read a label that is swimming away
  // from the cursor, and a cluster that collapses under your pointer is worse.
  pool.forEach(g=>{
    const el=g.children[1];
    const show=(px,py)=>{ held=+g.dataset.c; g.classList.add('holding');
      fillCapTip(+g.dataset.k||0,+g.dataset.e||0); tt.classList.add('on'); placeTip(px,py); };
    const hide=()=>{ held=-1; g.classList.remove('holding'); tt.classList.remove('on'); };
    el.addEventListener('pointerenter',ev=>show(ev.clientX,ev.clientY));
    el.addEventListener('pointermove',ev=>placeTip(ev.clientX,ev.clientY));
    el.addEventListener('pointerleave',hide);
    el.addEventListener('focus',()=>{ const r=el.getBoundingClientRect(); show(r.right,r.top); });
    el.addEventListener('blur',hide);
  });
  // ---- the scrollytell ----
  // each step, as it takes the screen, puts a class on the sticky wrapper (the css does the
  // visual work) and — where it can — reaches into the live simulation so the sentence you are
  // reading is literally true of the picture beside it while you read it.
  // the two buttons come down here, into the step that explains them. they are the SAME elements
  // (not clones), so every handler already bound to them keeps working untouched.
  const bslot=wrap.querySelector('.spbtns');
  if(bslot) bslot.append(playBtn, document.getElementById('decay'));

  const sticky=wrap.querySelector('.spsticky'), steps=[...wrap.querySelectorAll('.spstep')];
  let act='';
  const doAct=a=>{
    if(a===act) return;
    act=a;
    sticky.dataset.act=a;
    if(a==='rope') energy=Math.max(energy,2.2);          // make it breathe while you read that it does
    if(a==='cluster'){
      // kill the healthiest one on screen. the sentence says "watch — one is about to go", and it
      // had better go, or the sentence is just decoration.
      let best=-1,bv=-1;
      clus.forEach((c,i)=>{ if(c.state==='rise'&&c.vit>bv){bv=c.vit;best=i;} });
      if(best>=0){ clus[best].state='fall'; clus[best].fallT=0; }
    }
    if(a==='play') energy=Math.max(energy,1.4);
  };
  if('IntersectionObserver' in window){
    const io=new IntersectionObserver(es=>{
      // the step nearest the middle of the screen owns the coil
      let win=null,wd=1e9;
      steps.forEach(s=>{ const r=s.getBoundingClientRect(), c=r.top+r.height/2,
        d=Math.abs(c-innerHeight*0.5);
        if(r.bottom>0&&r.top<innerHeight&&d<wd){ wd=d; win=s; } });
      steps.forEach(s=>s.classList.toggle('on',s===win));
      if(win) doAct(win.dataset.act);
    },{threshold:[0,0.25,0.5,0.75,1],rootMargin:'-20% 0px -20% 0px'});
    steps.forEach(s=>io.observe(s));
    spIO=io;
  } else { steps.forEach(s=>s.classList.add('on')); }

  // the legend lights up the coil: hover a form of capital on the right, and every token of that
  // form — scattered across every cluster on the left — comes up while the rest drop back.
  wrap.querySelectorAll('.spchip.cap').forEach(b=>{
    const i=+b.dataset.k;
    const lit=on=>{ focK=on?i:-1; capg.classList.toggle('focusing',on); b.classList.toggle('lit',on);
      if(reduce) drawClusters(0); };            // no raf to repaint it for us
    b.addEventListener('pointerenter',()=>lit(true));
    b.addEventListener('pointerleave',()=>lit(false));
    b.addEventListener('focus',()=>lit(true));
    b.addEventListener('blur',()=>lit(false));
  });
}

function fillCapTip(i,e){
  const k=CAPITALS[i], T=TURNS[e], dark=spDark();
  tt.style.setProperty('--acc',dark?k.d:k.c);
  tt.innerHTML=`<div class="nm">${k.em} ${k.n} capital</div>
    <div class="er">passing through turn ${e+1} of 5 · ${T.era}</div>
    <p class="what">here it takes the form of <b>${k.w[e]}</b>. the same stock, re-enforced: what changes
      between the turns is not the capital but who can make a claim on it stick.</p>
    <div class="gf">
      <div class="g"><b>held by</b> · ${T.lean}</div>
      <div class="b"><b>at the scale of</b> · ${T.scale}</div>
    </div>
    <p class="note">it slows where leaving is expensive. that is not a bug in the animation — that is where capital actually piles up.</p>`;
}

function fillSpiralTip(s,e){
  const T=TURNS[e], M=MODES[s.mode], era=M.eras[e], dark=spDark();
  const names=era.mechs.slice(0,3).map(mm=>mm.name).join(' · ');
  tt.style.setProperty('--acc',dark?s.d:s.c);
  tt.innerHTML=`<div class="nm">${s.em} ${s.label}</div>
    <div class="er">turn ${e+1} of 5 · ${era.name} · ${era.years}</div>
    <p class="what">this era, the answer leaned on <b>${s.w[e]}</b>. the loop ran once more — adopt, formalize, scale, capture, fork —
      and came out the far side holding about <b>${T.scale}</b> together.</p>
    <div class="gf">
      <div class="g"><b>range won</b> · ${T.scale}</div>
      <div class="b"><b>what it cost</b> · ${['nothing yet — you could still walk','the shunning','the state','you cannot leave','fork it and go'][e]}</div>
    </div>
    <p class="note">${era.mechs.length} mechanisms in this era — ${names} …</p>
    <div class="hintline">click to open the ${s.label} tab at this era</div>`;
}

  m('The Waqf',0,"an islamic endowment: land dedicated in perpetuity, inalienable, its income assigned forever to a mosque, a fountain, a hospital — or to your own descendants. by the nineteenth century an enormous share of ottoman land was in waqf and simply could not be sold.",
    "public goods funded for centuries by one irrevocable act","the market, and eventually the economy; the dead hand takes the land off the board for good"),
  m('The Domesday Book',0,"1086: william sends commissioners to write down every manor, every plough team, every pig in england. it is built as a tax roll, and within a generation it is the proof. this is the moment the record starts making the claim instead of merely describing it.",

  m('The Enclosure Acts',0,"roughly 5,200 separate acts of parliament between 1604 and 1914 enclose about 6.8 million acres of english common field and waste. it is entirely legal, and it is compensated — to whoever could document a right. the cottager with one cow and four hundred years of custom could not.",
    "consolidated fields, higher yields, and the landless workforce that walked to the factories","the commoner, whose bundle of small customary rights was valued at nothing and extinguished by statute"),

  m('The Survey Grid',0,"the land ordinance of 1785: six-mile townships, thirty-six one-mile sections, numbered. the rectangle is a technology — it lets you sell land sight unseen, by mail, to a man who has never been there. the grid runs to the horizon and it does not care where the river is.",

  m('The Homestead Act',0,"160 acres to anyone who lived on it five years and improved it. about 270 million acres — a tenth of the united states — moved this way. it is the largest single distribution of wealth in american history, and every acre of it had a prior occupant.",
    "ownership for people who arrived with nothing, at continental scale","the nations it came from — and, in practice, nearly every black applicant","1862"),
  m('The Dawes Act',0,"1887: break tribal land into individual allotments, on the stated theory that private title civilizes. the 'surplus' left over is sold to settlers, and allotments become saleable. tribal landholding falls from about 138 million acres to 48 million by 1934.",
    "nothing it claimed; it is assimilation carried out with a surveyor's chain","the tribes, who lost two-thirds of what was left in under fifty years","1887"),
  m('Torrens Title',0,"south australia, 1858: the state keeps one register and the register IS the title, not evidence of it. buy in good faith and no forgotten deed from 1837 can dispossess you. adopted across australia, canada, much of asia — and largely refused by the united states.",
    "a transfer that takes an afternoon and cannot be unwound","the prior claim that was true but unregistered; it is extinguished, with cash at best","robert torrens, 1858"),
  m('Eminent Domain',0,"the state may take your land at a price it sets, because the road has to go somewhere. every property system on earth has this exception, and the exception tells you what property actually is.",
    "railways, aqueducts, and anything that must cross a thousand owners","the holdout — and, reliably, whichever neighborhood had the least political power"),
  m('The Land Value Tax',0,"tax the unimproved value of the ground and not the building on it. the value of a manhattan lot was created by manhattan, not by its owner. it is the one tax that cannot be dodged, does not distort, and taxes no labor at all — and almost every economist since has agreed, and almost nobody has enacted it.",
    "collecting the value that the community itself created","getting passed; the people who vote on it are the people who hold the land","george, progress and poverty, 1879"),
  m('The Mortgage',0,"the holc and then the fha, 1933-34, invent the long, low-down-payment, self-amortizing loan. before it you put half down and refinanced a balloon every five years. the thirty-year mortgage is the most powerful land-distribution machine ever built — and it is administered by a bank, using a map.",
    "making an owner out of a wage","anyone the map excluded — and every buyer after, since the loan itself bids the asset up"),
  m('Zoning',0,"euclid v. ambler, 1926: the supreme court blesses the power to say what may be built where. euclid's own brief called apartment buildings 'mere parasites'. the setback, the lot minimum, the single-family district all descend from that sentence.",
    "keeping the tannery off the school's street","the person who is not there yet; zoning is a vote by the present against the future","euclid v. ambler, 1926"),
  m('Redlining',0,"the holc's 'residential security' maps grade neighborhoods a to d and color the d's red; the fha underwriting manual then declines to insure inside them. a map, drawn by a few dozen men in four years, decided which families compounded three generations of housing wealth and which did not.",
    "nothing","black neighborhoods, comprehensively — and the effect is still legible in the same census tracts today","holc maps, 1935-40"),
  x('The Single Tax Colony',"fairhope, alabama (1894) and arden, delaware (1900): actual georgist towns. the trust owns the land, leases it to you, and collects the ground rent instead of taxing what you build on it. both are still there.",
    "proof that the mechanism runs on real dirt with real people","scale; a century on, they are charming, and they are two towns"),
  x('Adverse Possession',"occupy openly, notoriously and continuously for long enough and the land is yours — against the deed-holder himself. the law's own quiet admission that use was a claim all along.",

  x('The Fictitious Commodity',"polanyi: land, labour and money were never produced for sale, and treating them as commodities is a fiction that society then has to spend itself repairing.",

 ]},

  m('The Land Tax In Force',0,"estonia has taxed land value and not buildings since 1993. denmark's grundskyld goes back to 1922. singapore and hong kong lease the ground and keep the rent. the mechanism is not hypothetical — it exists, it works, and everywhere it exists it has been capped, frozen or whittled by the people who hold the land.",

  m("Ostrom's Rules",0,"hardin's 1968 essay described a pasture with no rules and then generalized to all commons. ostrom went and looked: swiss alpine pasture, japanese iriai forests, spanish huertas, all running for centuries on clear boundaries, local monitoring and graduated sanctions. she took the nobel in 2009 essentially for pointing out that hardin had not checked.",
    "eight design principles — the closest thing this whole tab has to an engineering manual","scale; every one of her cases is a group small enough to watch each other","ostrom, nobel, 2009"),
  m('The Permitting Problem',0,"the shortage is not of land, or of money, or of builders. it is of permission. a mid-rise near transit can take years of discretionary hearings, and ceqa — written to protect the environment — has become the most reliable instrument in california for stopping housing.",

 mechs:[
  m('The Registry on Chain',0,"the republic of georgia hashed land titles to bitcoin with bitfury from 2016; honduras announced the same thing with factom in 2015 and it quietly died. the honest lesson is narrow and real: a chain can prove the record was not altered afterward. it cannot prove the record was true when it was written.",

    "the allocative efficiency of a market with no holdout problem in it","a home; nobody has yet built a version in which you can be sure of sleeping there next year","posner & weyl, radical markets, 2018"),
  m('The Network State',0,"próspera buys land on roatán and then buys the legal system around it: a honduran zede with its own regulation, courts and tax. honduras moved to repeal the zedes in 2022, and próspera responded with a claim against the country for around eleven billion dollars under an investment treaty.",

 ]},

const PASTELS=['#c8f2b0','#bcd9ff','#ffdfa8','#fdf49b','#ffc7e6','#aeeee2','#dcc9ff','#ffd4bd'];
const reduced=matchMedia('(prefers-reduced-motion:reduce)').matches;

// ---------- build the current tab's poster ----------
function renderEras(M){
  erasEl.innerHTML='';
  for(const era of ERAS){
    const sec=document.createElement('section'); sec.className='era'; sec.style.setProperty('--acc',era.acc);
    const cards=`
      <div class="ecard"><div class="et">${M.cards[0]}</div><ul>${era.currency.map(c=>`<li>${c}</li>`).join('')}</ul></div>
      <div class="ecard"><div class="et">${M.cards[1]}</div><ul>${era.group.map(c=>`<li>${c}</li>`).join('')}</ul></div>`;
    let xi=0;
    const mechs=era.mechs.map((mm,mi)=>{
      const R=sr(hashName(mm.name+'sz')); const d=Math.round((mm.extra?76:84)+R()*(mm.extra?22:30));
      const pastel=PASTELS[hashName(mm.name)%PASTELS.length];
      const duo=DUOS[hashName(mm.name+'c')%DUOS.length];
      const delay=(R()*6).toFixed(2);
      const pd=mm.extra?(xi++*0.05).toFixed(2):'0';
      return `<div class="mech${mm.extra?' extra':''}${mm.unb?' unb':''}${mm.hard?' hard':''}" tabindex="0" role="button" aria-label="${mm.name}" data-key="${mm.key}" data-era="${era.name} · ${era.years}"
        style="--pastel:${pastel};--acc:${era.acc};--d0:${duo[0]};--d1:${duo[1]};--pd:${pd}s;--pi:${mi}">
        <div class="disc" style="width:${d}px;height:${d}px;--bd:-${delay}s">${markSVG(mm.name,duo)}</div>
        <div class="nm">${mm.name}</div>
        ${mm.note?`<div class="pd">${mm.note}</div>`:''}
      </div>`;
    }).join('');
    const nx=era.mechs.filter(mm=>mm.extra).length;
    sec.innerHTML=`<div class="rail"><div class="ename">${era.name}</div><div class="eyears">${era.years}</div></div>
      <div class="ebody">${cards}${mechs}<button class="more" data-n="${nx}">+ ${nx} more invented in this era</button></div>`;
    // sparkle layer: lights up when this era is hovered or centered in the viewport
    const sp=document.createElement('div'); sp.className='sparkles';
    const SR=sr(hashName(era.name+'spark')), chars=['✦','✧','✹','＊','✺'];
    let sh='';
    for(let i=0;i<18;i++){
      const px=(3+SR()*94).toFixed(1), py=(6+SR()*88).toFixed(1);
      const col=[era.acc,'#ffd23f','#ffffff'][Math.floor(SR()*3)];
      sh+=`<span style="left:${px}%;top:${py}%;color:${col};font-size:${(9+SR()*11).toFixed(0)}px;--td:${(1.6+SR()*2).toFixed(2)}s;--dl:${(SR()*3).toFixed(2)}s">${chars[Math.floor(SR()*chars.length)]}</span>`;
    }
    sp.innerHTML=sh; sec.appendChild(sp);
    erasEl.appendChild(sec);
  }
}

const arcWrap=document.getElementById('arcwrap');
function renderArc(M){
  if(!M.arc){ arcWrap.innerHTML=''; return; }
  arcWrap.innerHTML=`<div class="arc" role="group" aria-label="how the rules get enforced">${M.arc.map((a,i)=>`
    <button class="arcstop" data-i="${i}" style="--ac:${a.c}">
      <span class="dot"></span><span class="at">${a.t}</span><span class="as">${a.s}</span>
    </button>`).join('')}</div>
    <p class="arcnote">${M.arcnote}</p>`;
  const eras=()=>[...document.querySelectorAll('.era')];
  const off=()=>document.querySelectorAll('.era.arclit').forEach(el=>el.classList.remove('arclit'));
  arcWrap.querySelectorAll('.arcstop').forEach(btn=>{
    const a=M.arc[+btn.dataset.i];
    const on=()=>a.eras.forEach(i=>eras()[i]?.classList.add('arclit'));
    btn.addEventListener('pointerenter',on);
    btn.addEventListener('pointerleave',off);
    btn.addEventListener('focus',on);
    btn.addEventListener('blur',off);
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const first=eras()[a.eras[0]]; if(!first) return;
      first.scrollIntoView({behavior:'smooth',block:'start'});
      a.eras.forEach(i=>{ const el=eras()[i]; el.classList.add('playpulse'); setTimeout(()=>el.classList.remove('playpulse'),1700); });
      zing(hashName(a.t),3);
    });
  });
}

const hardWrap=document.getElementById('hardwrap');
function setHard(on){
  document.documentElement.setAttribute('data-hard',on?'on':'off');
  try{ localStorage.setItem('ra-hard',on?'on':'off'); }catch(e){}
  const sw=hardWrap.querySelector('.hardsw'); if(sw) sw.setAttribute('aria-checked',on?'true':'false');
  const n=hardWrap.querySelector('.hardn'); if(n) n.textContent=on?'5 shown':'5 hidden';
  setTimeout(buildLifeline,500);
}
function renderHard(M){
  if(!M.hard){ hardWrap.innerHTML=''; return; }
  let on=false; try{ on=localStorage.getItem('ra-hard')==='on'; }catch(e){}
  hardWrap.innerHTML=`<div class="hardbar">
    <button class="hardsw" role="switch" aria-checked="${on}" aria-label="show the hard ones"><span class="knob"></span></button>
    <div class="hardtxt"><b>⚠ the hard ones · <span class="hardn">${on?'5 shown':'5 hidden'}</span></b><em>${M.hard}</em></div>
  </div>`;
  document.documentElement.setAttribute('data-hard',on?'on':'off');
  hardWrap.querySelector('.hardsw').addEventListener('click',e=>{
    e.stopPropagation();
    const now=document.documentElement.getAttribute('data-hard')!=='on';
    setHard(now);
    if(now) zing(hashName('hard'),2);
  });
}
