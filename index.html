<style>
  :root{
    --bg:#f1edfa; --ink:#221c30; --muted:#665e78; --panel:#ffffff; --line:#ddd4ec;
    --pgrad:linear-gradient(175deg,#c3b0f2 0%,#e2c4f0 52%,#fbc6e3 100%);
    --disc-mix:#ffffff; --pmix:76%; --card:#14101c; --cardink:#f4effc;
    --goodt:#0a7d0a; --badt:#b32626;
  }
  @media (prefers-color-scheme:dark){ :root{
    --bg:#0d0a16; --ink:#e6dff2; --muted:#a095b5; --panel:#191225; --line:#2e2440;
    --pgrad:linear-gradient(175deg,#221448 0%,#331754 52%,#43164a 100%);
    --disc-mix:#150f24; --pmix:38%; --card:#0b0813; --cardink:#f1eafc;
    --goodt:#5ad07d; --badt:#ff8080;
  }}
  :root[data-theme="dark"]{
    --bg:#0d0a16; --ink:#e6dff2; --muted:#a095b5; --panel:#191225; --line:#2e2440;
    --pgrad:linear-gradient(175deg,#221448 0%,#331754 52%,#43164a 100%);
    --disc-mix:#150f24; --pmix:38%; --card:#0b0813; --cardink:#f1eafc;
    --goodt:#5ad07d; --badt:#ff8080;
  }
  :root[data-theme="light"]{
    --bg:#f1edfa; --ink:#221c30; --muted:#665e78; --panel:#ffffff; --line:#ddd4ec;
    --pgrad:linear-gradient(175deg,#c3b0f2 0%,#e2c4f0 52%,#fbc6e3 100%);
    --disc-mix:#ffffff; --pmix:76%; --card:#14101c; --cardink:#f4effc;
    --goodt:#0a7d0a; --badt:#b32626;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  .page{max-width:1160px;margin:0 auto;padding:26px 14px 70px}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;color:var(--muted);font-size:12px;gap:10px;flex-wrap:wrap}
  .topbar a{color:inherit}
  button.plain{font:inherit;font-weight:600;font-size:12px;padding:4px 10px;border-radius:8px;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--ink)}

  .poster{position:relative;background:var(--pgrad);border:1px solid var(--line);border-radius:18px;padding:44px 30px 30px;overflow:hidden}
  #lifeline{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
  .poster>header,.era,.pfoot{position:relative;z-index:1}

  .poster>header{text-align:center;margin-bottom:34px}
  .poster h1{margin:0;font-size:clamp(30px,6vw,62px);font-weight:850;letter-spacing:.045em;line-height:1.02}
  .poster .sub{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:clamp(14px,2.6vw,26px);letter-spacing:.42em;margin:8px 0 0;font-weight:800;
    background:linear-gradient(90deg,#6247d6,#8a3fd1,#b535bb,#d63d97,#e8446f);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    animation:glitch 7s infinite}
  @keyframes glitch{0%,95%,100%{text-shadow:none}96%{text-shadow:-2px 0 rgba(240,60,170,.75),2px 0 rgba(60,200,240,.75)}97.4%{text-shadow:2px 0 rgba(240,60,170,.55),-2px 0 rgba(60,200,240,.55)}}
  .poster .lede{color:var(--muted);font-size:13px;margin:14px auto 0;max-width:66ch}
  .playbtn{font:inherit;font-weight:800;font-size:13px;margin-top:16px;padding:10px 22px;border-radius:999px;cursor:pointer;border:none;color:#fff;
    background:linear-gradient(90deg,#6247d6,#b535bb,#e8446f);box-shadow:0 8px 26px rgba(181,53,187,.45);transition:transform .25s,box-shadow .25s}
  .playbtn:hover{transform:translateY(-2px);box-shadow:0 14px 34px rgba(181,53,187,.6)}
  .era.playpulse .mech .disc{animation:ppop .6s cubic-bezier(.2,.7,.2,1) both;animation-delay:calc(var(--pi,0)*0.045s)}
  @keyframes ppop{0%{transform:scale(1)}45%{transform:scale(1.14)}100%{transform:scale(1)}}
  @media (prefers-reduced-motion:reduce){ .era.playpulse .mech .disc{animation:none} }

  .era{position:relative;display:grid;grid-template-columns:52px 1fr;gap:12px;padding:26px 0 20px;
    border-top:2px solid var(--line);border-top:2px solid color-mix(in srgb,var(--acc) 55%,transparent)}
  .era::before{content:'';position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .7s;
    background:radial-gradient(62% 85% at 50% 50%,color-mix(in srgb,var(--acc) 11%,transparent),transparent 72%)}
  .era.lit::before,.era:hover::before{opacity:1}
  .sparkles{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .7s;z-index:2}
  .era.lit .sparkles,.era:hover .sparkles{opacity:1}
  .sparkles span{position:absolute;line-height:1;text-shadow:0 0 10px currentColor;opacity:0;
    animation:twk var(--td,2.2s) ease-in-out infinite;animation-delay:var(--dl,0s);will-change:transform,opacity}
  @keyframes twk{0%,100%{opacity:0;transform:scale(.25) rotate(0deg)}50%{opacity:.95;transform:scale(1) rotate(100deg)}}
  @media (prefers-reduced-motion:reduce){ .sparkles span{animation:none;opacity:.5} }
  .rail{display:flex;flex-direction:column;align-items:center;gap:10px;padding-top:4px}
  .ename{writing-mode:vertical-rl;transform:rotate(180deg);font-weight:820;letter-spacing:.2em;font-size:13px;color:var(--acc);text-transform:uppercase;font-style:italic}
  :root[data-theme="dark"] .ename{color:color-mix(in srgb,var(--acc) 55%,#efe8fb)}
  @media (prefers-color-scheme:dark){ :root:not([data-theme="light"]) .ename{color:color-mix(in srgb,var(--acc) 55%,#efe8fb)} }
  .eyears{writing-mode:vertical-rl;transform:rotate(180deg);font-size:10.5px;color:var(--muted);letter-spacing:.08em}
  .ebody{display:flex;flex-wrap:wrap;gap:14px 18px;align-items:flex-start;justify-content:center}
  .ecard{background:var(--card);color:var(--cardink);border-radius:16px;padding:13px 15px;width:158px;font-size:11px;line-height:1.45;box-shadow:0 8px 26px rgba(10,6,20,.3)}
  .ecard .et{font-weight:780;font-size:12px;margin-bottom:4px;letter-spacing:.03em;color:var(--cardink);color:color-mix(in srgb,var(--acc) 45%,#ffffff)}
  .ecard .et::before{content:"✳ ";opacity:.85}
  .ecard ul{margin:0;padding:0;list-style:none;opacity:.82}

  .mech{display:flex;flex-direction:column;align-items:center;width:126px;cursor:pointer;outline:none;-webkit-tap-highlight-color:transparent;transition:opacity .3s,filter .3s}
  .disc{position:relative;overflow:hidden;border-radius:50%;display:grid;place-items:center;
    --dgA:color-mix(in srgb,var(--pastel) 88%,#ffffff);
    --dgB:color-mix(in srgb,var(--d0) 38%,#ffffff);
    border:2px solid color-mix(in srgb,var(--d1) 60%,transparent);
    background:var(--panel);background:radial-gradient(circle at 32% 26%,var(--dgA),var(--dgB));
    box-shadow:0 7px 18px color-mix(in srgb,var(--d1) 28%,transparent),inset 0 0 0 1px rgba(255,255,255,.4);
    transition:transform .35s cubic-bezier(.2,.7,.2,1),box-shadow .35s;
    animation:breathe 7s ease-in-out infinite;animation-delay:var(--bd,0s)}
  :root[data-theme="dark"] .disc{--dgA:color-mix(in srgb,var(--pastel) 34%,#171028);--dgB:color-mix(in srgb,var(--d0) 36%,#0e0a1c);box-shadow:0 7px 20px color-mix(in srgb,var(--d1) 36%,transparent),inset 0 0 0 1px rgba(255,255,255,.12)}
  @media (prefers-color-scheme:dark){ :root:not([data-theme="light"]) .disc{--dgA:color-mix(in srgb,var(--pastel) 34%,#171028);--dgB:color-mix(in srgb,var(--d0) 36%,#0e0a1c);box-shadow:0 7px 20px color-mix(in srgb,var(--d1) 36%,transparent),inset 0 0 0 1px rgba(255,255,255,.12)} }
  .disc::after{content:'';position:absolute;left:9%;top:7%;width:46%;height:38%;border-radius:50%;
    background:radial-gradient(closest-side,rgba(255,255,255,.6),rgba(255,255,255,0));pointer-events:none}
  :root[data-theme="dark"] .disc::after{background:radial-gradient(closest-side,rgba(255,255,255,.18),rgba(255,255,255,0))}
  @media (prefers-color-scheme:dark){ :root:not([data-theme="light"]) .disc::after{background:radial-gradient(closest-side,rgba(255,255,255,.18),rgba(255,255,255,0))} }
  .disc svg{width:78%;height:78%;transition:transform .5s cubic-bezier(.2,.7,.2,1)}
  @keyframes breathe{50%{transform:scale(1.025)}}
  .mech .nm{margin-top:7px;font-size:12px;font-weight:680;text-align:center;line-height:1.25}
  .mech .pd{font-size:10px;color:var(--muted);text-align:center;line-height:1.3;margin-top:2px;max-width:120px}
  .mech:hover .disc,.mech:focus-visible .disc,.mech.pinned .disc{transform:scale(1.12);animation-play-state:paused;
    box-shadow:0 18px 48px color-mix(in srgb,var(--d1) 55%,transparent),0 0 0 3px var(--d1),0 0 26px color-mix(in srgb,var(--d1) 45%,transparent)}
  .mech:hover .disc svg,.mech:focus-visible .disc svg,.mech.pinned .disc svg{transform:rotate(10deg) scale(1.06)}
  .ebody:hover .mech:not(:hover):not(.pinned){opacity:.5;filter:saturate(.7)}

  .mech.extra{display:none}
  .era.xp .mech.extra{display:flex;animation:pop .45s cubic-bezier(.2,.7,.2,1) both;animation-delay:var(--pd,0s)}
  @keyframes pop{from{opacity:0;transform:translateY(12px) scale(.85)}}
  .mech.extra .disc{border-style:dashed}
  .mech.unb .disc{border-style:dashed;border-width:2px}
  .mech.unb .nm::after{content:" ✦";color:var(--acc)}
  .more{align-self:center;font:inherit;font-size:12px;font-weight:700;padding:9px 16px;border-radius:999px;cursor:pointer;
    border:1.5px dashed var(--acc);
    background:var(--panel);background:color-mix(in srgb,var(--acc) 10%,transparent);
    color:var(--acc);transition:transform .25s,box-shadow .25s;flex-basis:100%;max-width:290px;margin-top:4px}
  :root[data-theme="dark"] .more{color:color-mix(in srgb,var(--acc) 55%,#efe8fb)}
  @media (prefers-color-scheme:dark){ :root:not([data-theme="light"]) .more{color:color-mix(in srgb,var(--acc) 55%,#efe8fb)} }
  .more:hover{transform:translateY(-2px);box-shadow:0 10px 26px color-mix(in srgb,var(--acc) 35%,transparent)}

  .pfoot{margin-top:26px;display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:11.5px}
  .pfoot a{color:inherit}
  .pfoot .fright{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:5px}
  .pfoot .tbc{color:var(--muted)}
  .pfoot .da{display:inline-flex;align-items:center;gap:9px;color:var(--ink);font-weight:600}
  .pfoot .da svg{height:17px;width:auto;display:block;color:var(--ink)}
  .buy{display:inline-block;font-weight:750;font-size:12px;padding:8px 15px;border-radius:999px;text-decoration:none;
    color:#fff !important;background:linear-gradient(90deg,#b535bb,#e8446f);
    box-shadow:0 6px 18px color-mix(in srgb,#e8446f 40%,transparent);transition:transform .25s,box-shadow .25s}
  .buy:hover{transform:translateY(-2px);box-shadow:0 12px 28px color-mix(in srgb,#e8446f 55%,transparent)}
  .below{color:var(--muted);font-size:12.5px;max-width:92ch;margin:18px 4px 0}
  .below a{color:inherit}

  #tt{position:fixed;pointer-events:none;z-index:60;background:var(--panel);color:var(--ink);border:1px solid var(--line);border-left:3px solid var(--acc,#8b7fb8);border-radius:12px;padding:12px 14px;width:300px;box-shadow:0 14px 44px rgba(10,6,20,.4);font-size:12.5px;display:none}
  #tt.on{display:block}
  #tt .nm{font-weight:760;font-size:15px;line-height:1.2}
  #tt .er{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin:2px 0 7px}
  #tt .er em{color:var(--acc);font-style:normal;font-weight:700}
  #tt .what{margin:0 0 8px;line-height:1.5}
  #tt .note{margin:0 0 8px;color:var(--muted);font-style:italic;font-size:11.5px}
  #tt .gf{display:grid;gap:5px;margin-bottom:8px}
  #tt .gf div{font-size:11.5px;line-height:1.45;padding:6px 9px;border-radius:8px;background:var(--bg)}
  #tt .gf .g{background:color-mix(in srgb,#0ca30c 9%,var(--panel))}
  #tt .gf .b{background:color-mix(in srgb,#d03b3b 8%,var(--panel))}
  #tt .gf .g b{color:var(--goodt)} #tt .gf .b b{color:var(--badt)}
  #tt .genes{display:flex;flex-wrap:wrap;gap:4px}
  #tt .genes span{font-size:10px;border:1px solid var(--line);border-radius:999px;padding:2px 7px;color:var(--muted)}
  #tt .genes span b{color:var(--ink);font-weight:650}
  #tt .hintline{margin-top:8px;color:var(--muted);font-size:10px;border-top:1px solid var(--line);padding-top:6px}

  @media(max-width:720px){
    .poster{padding:30px 12px 20px}
    .era{grid-template-columns:1fr;gap:6px}
    .rail{flex-direction:row;justify-content:flex-start;gap:8px;padding:0 4px}
    .ename,.eyears{writing-mode:horizontal-tb;transform:none}
    .mech{width:104px}
    .ecard{width:47%}
  }
  @media (prefers-reduced-motion:reduce){
    .disc{animation:none}
    .poster .sub{animation:none}
    .era.xp .mech.extra{animation:none}
  }

  /* ---------- tabs + power-mode palette ---------- */
  .tabs{display:flex;justify-content:center;gap:8px;margin-bottom:22px;flex-wrap:wrap}
  .tab{font:inherit;font-weight:800;font-size:12.5px;letter-spacing:.04em;padding:8px 18px;border-radius:999px;cursor:pointer;
    border:1.5px solid var(--line);background:var(--panel);color:var(--muted);transition:transform .25s,box-shadow .25s,color .25s}
  .tab:hover{transform:translateY(-1px)}
  .tab .em{margin-right:7px}
  .tab.on{color:#fff;border-color:transparent}
  .tab.on.t-alloc{background:linear-gradient(90deg,#6247d6,#b535bb,#e8446f);box-shadow:0 6px 18px rgba(181,53,187,.4)}
  .tab.on.t-power{background:linear-gradient(90deg,#a06a1f,#b53a35,#8f2f7a);box-shadow:0 6px 18px rgba(168,42,85,.4)}
  .tab.on.t-live{background:linear-gradient(90deg,#3c7d2a,#0e8189,#6247d6);box-shadow:0 6px 18px rgba(14,129,137,.4)}
  .buy.powergrad{background:linear-gradient(90deg,#b0561f,#a82a55)}
  .buy.livegrad{background:linear-gradient(90deg,#1f8a5c,#2b6cb0)}
  :root[data-mode="power"]{--pgrad:linear-gradient(175deg,#eed3ae 0%,#eec4b6 52%,#eab7d2 100%)}
  @media (prefers-color-scheme:dark){ :root[data-mode="power"]:not([data-theme="light"]){--pgrad:linear-gradient(175deg,#331409 0%,#42101c 52%,#33103c 100%)} }
  :root[data-mode="power"][data-theme="dark"]{--pgrad:linear-gradient(175deg,#331409 0%,#42101c 52%,#33103c 100%)}
  :root[data-mode="power"][data-theme="light"]{--pgrad:linear-gradient(175deg,#eed3ae 0%,#eec4b6 52%,#eab7d2 100%)}
  :root[data-mode="power"] .poster .sub{background:linear-gradient(90deg,#a06a1f,#b0561f,#b53a35,#a82a55,#8f2f7a);-webkit-background-clip:text;background-clip:text}
  :root[data-mode="live"]{--pgrad:linear-gradient(175deg,#cfe9b8 0%,#bfe6d2 52%,#bcd9f2 100%)}
  @media (prefers-color-scheme:dark){ :root[data-mode="live"]:not([data-theme="light"]){--pgrad:linear-gradient(175deg,#132a0e 0%,#0c2b26 52%,#141c3f 100%)} }
  :root[data-mode="live"][data-theme="dark"]{--pgrad:linear-gradient(175deg,#132a0e 0%,#0c2b26 52%,#141c3f 100%)}
  :root[data-mode="live"][data-theme="light"]{--pgrad:linear-gradient(175deg,#cfe9b8 0%,#bfe6d2 52%,#bcd9f2 100%)}
  :root[data-mode="live"] .poster .sub{background:linear-gradient(90deg,#3c7d2a,#1f8a5c,#0e8189,#2b6cb0,#6247d6);-webkit-background-clip:text;background-clip:text}
  :root[data-mode="live"] .playbtn{background:linear-gradient(90deg,#3c7d2a,#0e8189,#6247d6);box-shadow:0 8px 26px rgba(14,129,137,.45)}
  :root[data-mode="live"] .playbtn:hover{box-shadow:0 14px 34px rgba(14,129,137,.6)}
  :root[data-mode="power"] .playbtn{background:linear-gradient(90deg,#a06a1f,#b53a35,#8f2f7a);box-shadow:0 8px 26px rgba(168,42,85,.45)}
  :root[data-mode="power"] .playbtn:hover{box-shadow:0 14px 34px rgba(168,42,85,.6)}
  .tab.on.t-truth{background:linear-gradient(90deg,#2a62c0,#6b46d6,#8f3fd1);box-shadow:0 6px 18px rgba(107,70,214,.4)}
  .tab.on.t-identity{background:linear-gradient(90deg,#3e8a1f,#0e8f7a,#2b6cd0);box-shadow:0 6px 18px rgba(14,143,122,.4)}
  .buy.truthgrad{background:linear-gradient(90deg,#2a62c0,#8f3fd1)}
  .buy.identitygrad{background:linear-gradient(90deg,#1f8f4d,#2b6cd0)}
  .buy.trustgrad{background:linear-gradient(90deg,#d4682b,#a83a9e)}
  .buy.recordgrad{background:linear-gradient(90deg,#6e7440,#3a5fd0)}
  .buy.conflictgrad{background:linear-gradient(90deg,#b32626,#4a58d0)}
  .tab.on.t-trust{background:linear-gradient(90deg,#c9820a,#d94f4f,#a83a9e);box-shadow:0 6px 18px rgba(217,79,79,.4)}
  .tab.on.t-record{background:linear-gradient(90deg,#8a6a2a,#4a7d63,#3a5fd0);box-shadow:0 6px 18px rgba(74,125,99,.4)}
  .tab.on.t-conflict{background:linear-gradient(90deg,#b32626,#9c4a63,#4a58d0);box-shadow:0 6px 18px rgba(156,74,99,.4)}
  :root[data-mode="truth"]{--pgrad:linear-gradient(175deg,#bdd7f2 0%,#c8c6f4 52%,#dcc4f2 100%)}
  @media (prefers-color-scheme:dark){ :root[data-mode="truth"]:not([data-theme="light"]){--pgrad:linear-gradient(175deg,#0a1c33 0%,#161040 52%,#26103e 100%)} }
  :root[data-mode="truth"][data-theme="dark"]{--pgrad:linear-gradient(175deg,#0a1c33 0%,#161040 52%,#26103e 100%)}
  :root[data-mode="truth"][data-theme="light"]{--pgrad:linear-gradient(175deg,#bdd7f2 0%,#c8c6f4 52%,#dcc4f2 100%)}
  :root[data-mode="truth"] .poster .sub{background:linear-gradient(90deg,#146e8f,#2a62c0,#4a58d0,#6b46d6,#8f3fd1);-webkit-background-clip:text;background-clip:text}
  :root[data-mode="truth"] .playbtn{background:linear-gradient(90deg,#2a62c0,#6b46d6,#8f3fd1);box-shadow:0 8px 26px rgba(107,70,214,.45)}
  :root[data-mode="truth"] .playbtn:hover{box-shadow:0 14px 34px rgba(107,70,214,.6)}
  :root[data-mode="identity"]{--pgrad:linear-gradient(175deg,#c9ecb8 0%,#b8e8d6 52%,#bcd7f2 100%)}
  @media (prefers-color-scheme:dark){ :root[data-mode="identity"]:not([data-theme="light"]){--pgrad:linear-gradient(175deg,#12290a 0%,#08291f 52%,#0a1c33 100%)} }
  :root[data-mode="identity"][data-theme="dark"]{--pgrad:linear-gradient(175deg,#12290a 0%,#08291f 52%,#0a1c33 100%)}
  :root[data-mode="identity"][data-theme="light"]{--pgrad:linear-gradient(175deg,#c9ecb8 0%,#b8e8d6 52%,#bcd7f2 100%)}
  :root[data-mode="identity"] .poster .sub{background:linear-gradient(90deg,#3e8a1f,#1f8f4d,#0e8f7a,#0f85a8,#2b6cd0);-webkit-background-clip:text;background-clip:text}
  :root[data-mode="identity"] .playbtn{background:linear-gradient(90deg,#3e8a1f,#0e8f7a,#2b6cd0);box-shadow:0 8px 26px rgba(14,143,122,.45)}

// ---------- generative line-botany, seeded by name ----------
function hashName(n){ let h=2166136261; for(const c of n){ h^=c.charCodeAt(0); h=Math.imul(h,16777619); } return (h>>>0)||1; }
function sr(seed){ let s=seed%2147483647; if(s<=0)s+=2147483646; return ()=>{ s=s*16807%2147483647; return (s-1)/2147483646; }; }
function markSVG(name,duo){
  const R=sr(hashName(name)), type=Math.floor(R()*5), P=[];
  const L=(x1,y1,x2,y2)=>P.push(`M${x1.toFixed(1)} ${y1.toFixed(1)}L${x2.toFixed(1)} ${y2.toFixed(1)}`);
  const O=(cx,cy,r)=>P.push(`M${(cx+r).toFixed(1)} ${cy.toFixed(1)}A${r.toFixed(1)} ${r.toFixed(1)} 0 1 0 ${(cx-r).toFixed(1)} ${cy.toFixed(1)}A${r.toFixed(1)} ${r.toFixed(1)} 0 1 0 ${(cx+r).toFixed(1)} ${cy.toFixed(1)}`);
  if(type===0){ // radial burst with twigs
    const n=12+Math.floor(R()*10);
    for(let i=0;i<n;i++){ const a=i/n*6.283+R()*.12, r0=3+R()*4, r1=24+R()*16;
      const x0=Math.cos(a)*r0,y0=Math.sin(a)*r0,x1=Math.cos(a)*r1,y1=Math.sin(a)*r1;
      L(x0,y0,x1,y1);
      const tm=.55+R()*.3, tx=x0+(x1-x0)*tm, ty=y0+(y1-y0)*tm, ta=a+(R()<.5?-.5:.5), tl=4+R()*6;
      L(tx,ty,tx+Math.cos(ta)*tl,ty+Math.sin(ta)*tl);
      if(R()<.5) O(x1,y1,1.3);
    }
  } else if(type===1){ // concentric petal mandala
    const rings=3+Math.floor(R()*2);
    for(let g=1;g<=rings;g++){ const r=g*(34/rings)*(.8+R()*.2), k=5+g*3;
      for(let i=0;i<k;i++){ const a=i/k*6.283+g*.3;
        const px=Math.cos(a)*r, py=Math.sin(a)*r;
        L(Math.cos(a)*(r-5),Math.sin(a)*(r-5),px,py); O(px,py,1.4+R());
      } }
    O(0,0,2.4);
  } else if(type===2){ // fern
    L(0,32,0,-30);
    for(let y=26;y>-26;y-=5.5){ const side=(y/5.5)%2<1?1:-1, len=(30-Math.abs(y))*.55+3, a=-.9;
      const bx=side*Math.cos(a)*len, by=y+Math.sin(a)*len;
      L(0,y,bx,by);
      L(bx*.55,y+(by-y)*.55,bx*.55+side*4,y+(by-y)*.55-4);
      if(R()<.35) O(bx,by,1.1);
    }
  } else if(type===3){ // spiral
    let first=true; const turns=(3+R()*2.4)*6.283, step=.28, kr=1.35+R()*.5;
    let d='';
    for(let t=0;t<turns;t+=step){ const r=kr*t*.9, px=Math.cos(t)*r, py=Math.sin(t)*r;
      if(first){ d=`M${px.toFixed(1)} ${py.toFixed(1)}`; first=false; } else d+=`L${px.toFixed(1)} ${py.toFixed(1)}`;
      if(t%(step*9)<step) O(px,py,1.2);
    }
    P.push(d);
  } else { // woven lattice clipped to circle
    const s=7.5+R()*2, useX=R()<.5;
    for(let y=-32;y<=32;y+=s){ for(let px=-32+((y/s)%2?s/2:0);px<=32;px+=s){
      if(px*px+y*y>30*30) continue;
      const h=s*.32;
      if(useX){ L(px-h,y-h,px+h,y+h); L(px-h,y+h,px+h,y-h); }
      else { L(px,y-h,px+h,y); L(px+h,y,px,y+h); L(px,y+h,px-h,y); L(px-h,y,px,y-h); }
    } }
  }
  // layered art: soft aura underlayer, gradient main strokes, seeded jewel + spark dots
  const uid='g'+hashName(name).toString(36);
  const d=P.join('');
  let dots='';
  const DR=sr(hashName(name+'dots'));
  for(let i=0;i<7;i++){
    const a=DR()*6.283, r=16+DR()*24, cx=(Math.cos(a)*r).toFixed(1), cy=(Math.sin(a)*r).toFixed(1);
    const big=DR()<.4;
    dots+=`<circle cx="${cx}" cy="${cy}" r="${(big?1.6:0.9)+DR()*.6}" fill="${i%2?'#ffffff':duo[1]}" opacity="${big?.95:.8}"/>`;
  }
  return `<svg viewBox="-50 -50 100 100" aria-hidden="true">
    <defs><linearGradient id="${uid}" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="${duo[0]}"/><stop offset="1" stop-color="${duo[1]}"/>
    </linearGradient></defs>
    <g fill="none" stroke="${duo[1]}" stroke-width="3.6" stroke-linecap="round" opacity=".18" transform="scale(1.03)"><path d="${d}"/></g>
    <g fill="none" stroke="url(#${uid})" stroke-width="1.9" stroke-linecap="round" opacity=".96"><path d="${d}"/></g>
    ${dots}
  </svg>`;
}

  const off=()=>document.querySelectorAll('.era.arclit').forEach(el=>el.classList.remove('arclit'));
  arcWrap.querySelectorAll('.arcstop').forEach(btn=>{
    const a=M.arc[+btn.dataset.i];
    const on=()=>a.eras.forEach(i=>eras()[i]?.classList.add('arclit'));
    btn.addEventListener('pointerenter',on);
    btn.addEventListener('pointerleave',off);
    btn.addEventListener('focus',on);
    btn.addEventListener('blur',off);
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const first=eras()[a.eras[0]]; if(!first) return;
      first.scrollIntoView({behavior:'smooth',block:'start'});
      a.eras.forEach(i=>{ const el=eras()[i]; el.classList.add('playpulse'); setTimeout(()=>el.classList.remove('playpulse'),1700); });
      zing(hashName(a.t),3);
    });
  });
}

function bindPoster(){
  WHAT={}; ERAS.forEach(e=>e.mechs.forEach(mm=>WHAT[mm.key]=mm));
  BYSLUG={}; document.querySelectorAll('.mech').forEach(el=>BYSLUG[slugOf(el.dataset.key)]=el);
  document.querySelectorAll('.more').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const era=btn.closest('.era'); era.classList.toggle('xp');
      btn.textContent=era.classList.contains('xp')?'− show fewer':'+ '+btn.dataset.n+' more invented in this era';
      setTimeout(buildLifeline,500);
    });
  });
  document.querySelectorAll('.mech').forEach(el=>{
    el.addEventListener('pointerenter',e=>{ if(pinned)return; fillTip(el); tt.classList.add('on'); placeTip(e.clientX,e.clientY); });
    el.addEventListener('pointermove',e=>{ if(pinned)return; placeTip(e.clientX,e.clientY); });
    el.addEventListener('pointerleave',()=>{ if(pinned)return; tt.classList.remove('on'); });
    el.addEventListener('focus',()=>{ if(pinned)return; const r=el.getBoundingClientRect(); fillTip(el); tt.classList.add('on'); placeTip(r.right,r.top); });
    el.addEventListener('blur',()=>{ if(pinned)return; tt.classList.remove('on'); });
    el.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); el.click(); } });
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const k=bumpCombo();
      burst(el,k); zing(hashName(el.dataset.key),k);
      if(pinned===el){ unpin(); return; }
      pinEl(el, e.clientX, e.clientY);
    });
  });
}

// light up the era nearest the viewport center as you scroll
function litCheck(){
  const mid=innerHeight*0.45; let best=null,bd=1e9;
  document.querySelectorAll('.era').forEach(el=>{ const r=el.getBoundingClientRect();
    if(r.bottom<0||r.top>innerHeight) return;
    const c=r.top+r.height/2, dd=Math.abs(c-mid); if(dd<bd){bd=dd;best=el;} });
  document.querySelectorAll('.era').forEach(el=>el.classList.toggle('lit',el===best));
}
let lraf=null;
window.addEventListener('scroll',()=>{ if(lraf)return; lraf=requestAnimationFrame(()=>{lraf=null;litCheck();}); },{passive:true});

// ---------- click zazz: chime + compounding snow-globe sparkle burst ----------
let AC=null, combo=1, lastClick=0;
function bumpCombo(){
  const now=performance.now();
  combo = (now-lastClick<2800) ? Math.min(10,combo+1) : 1;
  lastClick=now;
  return combo;
}
function zing(seed,k){
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended') AC.resume();
    const R=sr(seed);
    // per-mechanism base pitch, rising ~1.5 semitones per combo level
    const base=(420+R()*300)*Math.pow(2,((k||1)-1)*1.5/12), t0=AC.currentTime;
    [0,7,12].forEach((st,i)=>{
      const o=AC.createOscillator(), g=AC.createGain();
      o.type='sine'; o.frequency.value=base*Math.pow(2,st/12);
      const ts=t0+i*0.055;
      g.gain.setValueAtTime(0,ts);
      g.gain.linearRampToValueAtTime(0.055+0.004*(k||1),ts+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001,ts+0.5);
      o.connect(g).connect(AC.destination); o.start(ts); o.stop(ts+0.55);
    });
    // glittery noise shimmer on top
    const len=Math.floor(AC.sampleRate*0.22), buf=AC.createBuffer(1,len,AC.sampleRate), ch=buf.getChannelData(0);
    for(let i=0;i<len;i++) ch[i]=(Math.random()*2-1)*(1-i/len);
    const src=AC.createBufferSource(); src.buffer=buf;
    const hp=AC.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=6500;
    const ng=AC.createGain(); ng.gain.setValueAtTime(0.035,t0); ng.gain.exponentialRampToValueAtTime(0.0001,t0+0.22);
    src.connect(hp).connect(ng).connect(AC.destination); src.start(t0);
  }catch(e){}
}
function burst(el,k){
  if(reduced) return;
  k=k||1;
  const disc=el.querySelector('.disc'), r=disc.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2, rad=r.width/2;
  const d0=el.style.getPropertyValue('--d0')||'#fff', d1=el.style.getPropertyValue('--d1')||'#ffd23f';
  const chars=['✦','✧','✹','•','＊','❄'];
  const n=Math.min(110, 10+(k-1)*11); // compounds: 10 → 109 sparkles at 10x
  for(let i=0;i<n;i++){
    const s=document.createElement('span');
    s.textContent=chars[Math.floor(Math.random()*chars.length)];
    const col=[d0,d1,'#ffd23f','#ffffff'][Math.floor(Math.random()*4)];
    // spawn from the disc's rim, like shaken snow
    const sa=Math.random()*6.283, sx=cx+Math.cos(sa)*rad*0.7, sy=cy+Math.sin(sa)*rad*0.7;
    s.style.cssText=`position:fixed;left:${sx.toFixed(0)}px;top:${sy.toFixed(0)}px;color:${col};font-size:${7+Math.random()*10}px;line-height:1;pointer-events:none;z-index:70;text-shadow:0 0 9px currentColor;will-change:transform,opacity`;
    document.body.appendChild(s);
    // slow snow-globe physics: gentle rise, sideways sway, slow settle
    const a=Math.random()*6.283, sp=(24+Math.random()*46)*(1+k*0.12);
    const dx=Math.cos(a)*sp;
    const up=-(30+Math.random()*60)*(1+k*0.06);
    const settle=up+90+Math.random()*120;
    const sway=(Math.random()<.5?-1:1)*(8+Math.random()*14);
    const rot=Math.random()*300-150;
    const dur=2400+Math.random()*2200; // slow, floaty
    s.animate([
      {transform:'translate(-50%,-50%) translate(0,0) scale(.25) rotate(0deg)',opacity:0},
      {transform:`translate(-50%,-50%) translate(${(dx*.45).toFixed(0)}px,${(up*.75).toFixed(0)}px) scale(1) rotate(${(rot*.3).toFixed(0)}deg)`,opacity:1,offset:.22},
      {transform:`translate(-50%,-50%) translate(${(dx*.8+sway).toFixed(0)}px,${up.toFixed(0)}px) scale(.95) rotate(${(rot*.55).toFixed(0)}deg)`,opacity:.95,offset:.48},
      {transform:`translate(-50%,-50%) translate(${(dx-sway).toFixed(0)}px,${(up+(settle-up)*.55).toFixed(0)}px) scale(.8) rotate(${(rot*.8).toFixed(0)}deg)`,opacity:.8,offset:.75},
      {transform:`translate(-50%,-50%) translate(${(dx+sway*.5).toFixed(0)}px,${settle.toFixed(0)}px) scale(.35) rotate(${rot.toFixed(0)}deg)`,opacity:0}
    ],{duration:dur,easing:'ease-in-out'}).onfinish=()=>s.remove();
  }
  const ring=document.createElement('span');
  ring.style.cssText=`position:fixed;left:${cx}px;top:${cy}px;width:${r.width}px;height:${r.width}px;border:2.5px solid ${d1};border-radius:50%;pointer-events:none;z-index:69;transform:translate(-50%,-50%)`;
  document.body.appendChild(ring);
  ring.animate([{transform:'translate(-50%,-50%) scale(1)',opacity:.9},{transform:`translate(-50%,-50%) scale(${(1.8+k*0.15).toFixed(2)})`,opacity:0}],
    {duration:800+k*60,easing:'ease-out'}).onfinish=()=>ring.remove();
  // at high combo, give the disc itself a little snow-globe shake
  if(k>=3) disc.animate(
    [{transform:'rotate(0deg)'},{transform:`rotate(${2+k}deg)`},{transform:`rotate(-${2+k}deg)`},{transform:'rotate(0deg)'}],
    {duration:420,easing:'ease-in-out'});
}

// ---------- tooltip ----------
const tt=document.getElementById('tt');
function fillTip(el){
  const key=el.dataset.key, s=STATS[key], w=WHAT[key], acc=el.style.getPropertyValue('--acc');
  tt.style.setProperty('--acc',acc);
  tt.innerHTML=`<div class="nm">${w.name}</div>
    <div class="er">${el.dataset.era}${w.unb?' · <em>unbuilt ✦</em>':''}${w.extra&&!w.unb?' · extended set':''}</div>
    <p class="what">${w.what}</p>
    ${w.note?`<p class="note">poster: ${w.note}</p>`:''}
    <div class="gf">
      <div class="g"><b>good for</b> · ${w.good}</div>
      <div class="b"><b>not for</b> · ${w.not}</div>
    </div>
    ${s?`<div class="genes">${Object.entries(s).map(([gk,gv])=>`<span>${gk} · <b>${gv}</b></span>`).join('')}</div>`:''}
    <div class="hintline">click to pin · esc to close</div>`;
}
function placeTip(px,py){
  const w=tt.offsetWidth||300, h=tt.offsetHeight||190, pad=16;
  let ox=px+pad, oy=py+pad;
  if(ox+w>innerWidth-8) ox=px-w-pad;
  if(ox<8) ox=8;
  if(oy+h>innerHeight-8) oy=Math.max(8,py-h-pad);
  tt.style.left=ox+'px'; tt.style.top=oy+'px';
}
function pinEl(el,px,py){
  if(pinned) pinned.classList.remove('pinned');
  pinned=el; el.classList.add('pinned');
  fillTip(el); tt.classList.add('on');
  const r=el.getBoundingClientRect();
  placeTip(px||r.right, py||r.top);
  setURL(MODE,slugOf(el.dataset.key));
}
function unpin(){
  if(!pinned) return;
  pinned.classList.remove('pinned'); pinned=null; tt.classList.remove('on');
  setURL(MODE,null);
}
function expandEra(era){
  if(era.classList.contains('xp')) return;
  era.classList.add('xp');
  const b=era.querySelector('.more'); if(b) b.textContent='− show fewer';
  setTimeout(buildLifeline,500);
}
document.addEventListener('click',unpin);
document.addEventListener('keydown',e=>{ if(e.key==='Escape') unpin(); });

// ---------- play: walk the 12,000 years ----------
let playing=false, playTimers=[];
function stopPlay(){
  playing=false; playTimers.forEach(clearTimeout); playTimers=[];
  const b=document.getElementById('play'); b.textContent='▶ play 12,000 years';
  document.querySelectorAll('.era.playpulse').forEach(el=>el.classList.remove('playpulse'));
}
document.getElementById('play').addEventListener('click',e=>{
  e.stopPropagation();
  if(playing){ stopPlay(); return; }
  playing=true; e.target.textContent='■ stop';
  const eras=[...document.querySelectorAll('.era')];
  eras.forEach((el,i)=>{
    playTimers.push(setTimeout(()=>{
      el.scrollIntoView({behavior:'smooth',block:'center'});
      el.classList.add('playpulse');
      zing(hashName(el.querySelector('.ename').textContent), 1+i*2);
      playTimers.push(setTimeout(()=>el.classList.remove('playpulse'),1700));
    }, i*2400));
  });
  // finale: the corner nobody has built yet (per tab)
  playTimers.push(setTimeout(()=>{
    expandEra(eras[eras.length-1]);
    const fin=MODES[MODE].finale, el=BYSLUG[fin];
    if(el){ el.scrollIntoView({behavior:'smooth',block:'center'});
      playTimers.push(setTimeout(()=>{ burst(el,6); zing(hashName(fin),9); pinEl(el); stopPlay(); },900));
    } else stopPlay();
  }, eras.length*2400+500));
});
window.addEventListener('wheel',()=>{ if(playing) stopPlay(); },{passive:true});

// ---------- the pulsing lifeline ----------
const poster=document.getElementById('poster'), lsvg=document.getElementById('lifeline');
function buildLifeline(){
  const w=poster.clientWidth, h=poster.scrollHeight;
  lsvg.setAttribute('viewBox',`0 0 ${w} ${h}`);
  const eras=[...document.querySelectorAll('.era')];
  const pts=[{x:w*0.5,y:8}];
  eras.forEach((el,i)=>{ pts.push({x:w*(i%2?0.86:0.14), y:el.offsetTop+el.offsetHeight/2}); });
  pts.push({x:w*0.5,y:h-6});
  let d=`M${pts[0].x} ${pts[0].y}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[Math.max(0,i-1)], p1=pts[i], p2=pts[i+1], p3=pts[Math.min(pts.length-1,i+2)];
    const c1x=p1.x+(p2.x-p0.x)/6, c1y=p1.y+(p2.y-p0.y)/6;
    const c2x=p2.x-(p3.x-p1.x)/6, c2y=p2.y-(p3.y-p1.y)/6;
    d+=`C${c1x.toFixed(1)} ${c1y.toFixed(1)} ${c2x.toFixed(1)} ${c2y.toFixed(1)} ${p2.x.toFixed(1)} ${p2.y.toFixed(1)}`;
  }
  const accs=ERAS.map(e=>e.acc);
  lsvg.innerHTML=`
   <defs>
     <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
       ${accs.map((a,i)=>`<stop offset="${(i/(accs.length-1)*100).toFixed(0)}%" stop-color="${a}"/>`).join('')}
     </linearGradient>
     <filter id="blur"><feGaussianBlur stdDeviation="5"/></filter>
   </defs>
   <path d="${d}" fill="none" stroke="url(#lg)" stroke-width="9" opacity=".3" filter="url(#blur)"/>
   <path id="lpath" d="${d}" fill="none" stroke="url(#lg)" stroke-width="2.4" opacity=".72"
     stroke-dasharray="7 9" ${reduced?'':'class="flow"'}/>
   ${reduced?'':`
   <circle r="10" fill="url(#lg)" opacity=".35" filter="url(#blur)">
     <animateMotion dur="16s" repeatCount="indefinite" rotate="none"><mpath href="#lpath"/></animateMotion>
   </circle>
   <circle r="4" fill="#fff" opacity=".95">
     <animateMotion dur="16s" repeatCount="indefinite" rotate="none"><mpath href="#lpath"/></animateMotion>
   </circle>`}`;
}
const flowStyle=document.createElement('style');
flowStyle.textContent='@keyframes lflow{to{stroke-dashoffset:-160}} #lifeline .flow{animation:lflow 9s linear infinite}';
document.head.appendChild(flowStyle);
let rto; window.addEventListener('resize',()=>{ clearTimeout(rto); rto=setTimeout(buildLifeline,200); });

document.getElementById('theme').onclick=()=>{ const r=document.documentElement;
  const c=r.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  r.setAttribute('data-theme',c==='dark'?'light':'dark'); };

// ---------- tabs + hash routing ----------
// on http(s) the power + live tabs live at crawlable /power and /live urls (power.html / live.html carry their unfurl metadata);
// on file:// there are no clean urls, so everything is hash-only
const HTTPISH=/^https?:$/.test(location.protocol);
const BASEPATH=HTTPISH?location.pathname.replace(/(index|power|live|next|truth|identity|trust|record|conflict)(\.html)?$/,''):'';
const STUBBED={power:1,live:1,truth:1,identity:1,trust:1,record:1,conflict:1};
function setURL(mode,slug){
  if(HTTPISH) history.replaceState(null,'',(STUBBED[mode]?BASEPATH+mode:BASEPATH+location.search)+(slug?'#'+slug:''));
  else history.replaceState(null,'',mode==='alloc'?location.pathname+location.search+(slug?'#'+slug:''):'#'+mode+(slug?'/'+slug:''));
}
function setMode(mode,user){
  if(MODE===mode) return;
  stopPlay();
  if(pinned){ pinned.classList.remove('pinned'); pinned=null; tt.classList.remove('on'); }
  MODE=mode; const M=MODES[mode];
  STATS=M.stats; ERAS=M.eras;
  document.documentElement.setAttribute('data-mode',mode);
  document.title=M.title;
  favEl.setAttribute('href',"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>"+M.fav+"</text></svg>");
  h1El.innerHTML=M.h1;
  ledeEl.textContent=M.lede;
  footL.innerHTML=M.foot;
  document.querySelectorAll('.tab').forEach(b=>{ const on=b.dataset.mode===mode; b.classList.toggle('on',on); b.setAttribute('aria-selected',on); });
  renderEras(M); bindPoster(); renderArc(M);
  litCheck(); buildLifeline();
  if(user){
    setURL(mode,null);
    window.scrollTo({top:0,behavior:'smooth'});
  }
}
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>setMode(b.dataset.mode,true)));

// hash grammar: #power · #power/<slug> · #alloc/<slug> · bare #<slug> (legacy links from both old sites)
function parseHash(){
  const h=decodeURIComponent(location.hash.slice(1));
  if(!h) return {mode:'alloc',slug:null};
  const mm=h.match(/^(alloc|power|live|truth|identity|trust|record|conflict)(?:\/(.*))?$/);
  if(mm) return {mode:mm[1],slug:mm[2]||null};
  if(h==='next') return {mode:'truth',slug:null};
  for(const k of ['alloc','power','live','truth','identity','trust','record','conflict']) if(SLUGS[k].has(h)) return {mode:k,slug:h};
  return {mode:'alloc',slug:h};
}
function applyHash(){
  const {mode,slug}=parseHash();
  const first=(MODE===null), switched=(mode!==MODE);
  if(switched) setMode(mode,false);
  setURL(mode,slug);
  if(slug){
    const el=BYSLUG[slug]; if(!el) return;
    if(el.classList.contains('extra')) expandEra(el.closest('.era'));
    setTimeout(()=>{
      el.scrollIntoView({behavior:'smooth',block:'center'});
      setTimeout(()=>{ pinEl(el); burst(el,2); }, 900);
    }, 60);
  } else if(switched&&!first){
    window.scrollTo({top:0,behavior:'smooth'});
  }
}
window.addEventListener('hashchange',applyHash);
applyHash();
</script>
