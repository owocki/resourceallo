  /* the era ramp as a hairline across the top — the family mark */

  /* ================= above the fold: a sky on local time, a far city, five trees, one monk ================= */
  /* the fold is the ground line. the sky follows the visitor's clock — data-sky is stamped
     before first paint — and the monk sits through dawn, day, dusk and night alike. */
  .hero{position:relative;height:100svh;min-height:600px;display:flex;flex-direction:column;
    align-items:center;overflow:hidden;color:#dfe6f6;
    background:linear-gradient(180deg,#03040c 0%,#070a1a 42%,#0d1026 68%,#181231 88%,#20163a 100%)}
  :root[data-sky="dawn"] .hero{
    background:linear-gradient(180deg,#111633 0%,#2c2454 38%,#5e3a68 66%,#a85f63 85%,#e59a63 100%)}
  :root[data-sky="day"] .hero{
    background:linear-gradient(180deg,#4a9fe0 0%,#71b6ea 45%,#a3d2f2 78%,#cfe8f8 100%)}
  :root[data-sky="dusk"] .hero{
    background:linear-gradient(180deg,#181233 0%,#33204f 40%,#6e3260 68%,#b85756 86%,#ef9257 100%)}
  /* what each hour does to the rest of the scene: stars thin out, windows go dark, the
     city's ink lifts to a daytime haze, meteors only fall at night */
  :root[data-sky="dawn"] .stars,:root[data-sky="dusk"] .stars{opacity:.35}
  :root[data-sky="day"] .stars{display:none}
  :root[data-sky="dawn"] .meteors,:root[data-sky="day"] .meteors,:root[data-sky="dusk"] .meteors{display:none}
  :root[data-sky="day"] .city .win,:root[data-sky="day"] .city g[fill="url(#wp)"]{opacity:0}
  :root[data-sky="dawn"] .city .win{opacity:.5}
  :root[data-sky="dusk"] .city .win{opacity:.85}
  .city .blds{fill:#15152e}
  :root[data-sky="day"] .city .blds{fill:#7d93b8}
  :root[data-sky="dawn"] .city .blds{fill:#241d42}
  :root[data-sky="dusk"] .city .blds{fill:#1d1638}
  :root[data-sky="day"] .cityglow{background:radial-gradient(76% 96% at 50% 106%,rgba(255,255,255,.30),rgba(207,232,248,.14) 52%,transparent 78%)}
  :root[data-sky="dawn"] .cityglow,:root[data-sky="dusk"] .cityglow{
    background:radial-gradient(76% 96% at 50% 106%,rgba(255,166,96,.30),rgba(232,120,86,.12) 52%,transparent 78%)}

  /* stars: three phase groups so the sky breathes instead of blinking */
  .stars{position:absolute;inset:0;z-index:1;pointer-events:none}
  .stars i{position:absolute;border-radius:50%;background:#dfe8ff}
  .stars i.p1{animation:tw1 3.4s ease-in-out infinite}
  .stars i.p2{animation:tw1 4.6s ease-in-out infinite;animation-delay:-1.4s}
  .stars i.p3{animation:tw1 5.8s ease-in-out infinite;animation-delay:-2.9s}
  @keyframes tw1{0%,100%{opacity:.18}50%{opacity:.95}}
  @media (prefers-reduced-motion:reduce){ .stars i{animation:none;opacity:.55} }

  /* the city: it towers over the grove — lit windows all the way up, a warm aura
     around the skyline. the monk is flanked by it and unbothered by it. */
  .cityglow{position:absolute;left:0;right:0;bottom:0;height:74%;z-index:2;pointer-events:none;
    background:radial-gradient(76% 96% at 50% 106%,rgba(255,178,84,.22),rgba(181,53,187,.10) 52%,transparent 78%)}
  .city{position:absolute;left:50%;bottom:0;transform:translateX(-50%);z-index:3;
    width:max(100vw,1000px);pointer-events:none;opacity:.96}
  .city svg{display:block;width:100%;height:auto}
  .city .win{fill:#ffd98a}
  .city .win.c{fill:#9fd8ff}
  .city .w1{animation:wink 3.2s ease-in-out infinite}
  .city .w2{animation:wink 4.1s ease-in-out infinite;animation-delay:-1.3s}
  .city .w3{animation:wink 5.3s ease-in-out infinite;animation-delay:-2.6s}
  @keyframes wink{0%,100%{opacity:.25}50%{opacity:1}}
  @media (prefers-reduced-motion:reduce){ .city .w1,.city .w2,.city .w3{animation:none;opacity:.7} }

  .treeswrap{position:absolute;left:50%;bottom:0;transform:translateX(-50%);z-index:4;
    width:min(1240px,max(125vw,720px));pointer-events:none}
  .treeswrap svg{display:block;width:100%;height:auto}
  /* wind: each canopy leans and returns on its own clock; the trunks stay planted */
  .canopy{transform-box:fill-box;transform-origin:50% 92%;animation:sway 7s ease-in-out infinite}
  .t2 .canopy{animation-duration:8.4s;animation-delay:-2.1s}
  .t3 .canopy{animation-duration:6.2s;animation-delay:-1.2s}
  .t4 .canopy{animation-duration:9.1s;animation-delay:-3.4s}
  .t5 .canopy{animation-duration:7.7s;animation-delay:-4.6s}
  @keyframes sway{0%,100%{transform:rotate(-1.1deg) translateX(-1.5px)}50%{transform:rotate(1.3deg) translateX(2px)}}
  @media (prefers-reduced-motion:reduce){ .canopy{animation:none} }
  /* shooting stars: rare, brief, gone */
  .meteors span{position:absolute;width:130px;height:2px;opacity:0;pointer-events:none;z-index:1;
    background:linear-gradient(90deg,rgba(255,255,255,.95),rgba(170,195,255,.45),transparent);
    border-radius:2px;animation:shoot 12s linear infinite}
  .meteors span:nth-child(2){width:90px;animation-duration:17s;animation-delay:-7s}
  .meteors span:nth-child(3){width:110px;animation-duration:23s;animation-delay:-15s}
  @keyframes shoot{
    0%,91%{opacity:0;transform:rotate(-26deg) translateX(0)}
    92.5%{opacity:1}
    97%{opacity:0;transform:rotate(-26deg) translateX(-44vw)}
    100%{opacity:0;transform:rotate(-26deg) translateX(-44vw)}}
  @media (prefers-reduced-motion:reduce){ .meteors{display:none} }

  /* ---- the monk: sits on the ground line, under the trees, in front of everything.
     no words, no button — he IS the fold. every ring is geometry — no blur filters,
     mobile safari keeps its composure and so does he. ---- */
  .monk{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);z-index:5;
    width:min(250px,52vw);height:min(250px,52vw);cursor:pointer}
  /* the presence: a vast pool of light behind him that swells with the breath */
  .halo{position:absolute;inset:-130%;border-radius:50%;pointer-events:none;
    background:radial-gradient(circle at 50% 50%,rgba(160,205,255,.20) 0%,rgba(120,180,255,.10) 34%,rgba(181,120,255,.05) 56%,transparent 74%);
    animation:halo 6s ease-in-out infinite}
  @keyframes halo{0%,100%{transform:scale(.82);opacity:.55}50%{transform:scale(1.1);opacity:1}}
  /* the breath: one wide oval, six seconds — three in, three out */
  .breath{position:absolute;top:-42%;bottom:-42%;left:-105%;right:-105%;border-radius:50%;
    pointer-events:none;
    background:radial-gradient(ellipse 70% 50% at 50% 50%,rgba(120,180,255,.42) 0%,rgba(160,205,255,.22) 32%,rgba(120,180,255,.09) 56%,transparent 75%);
    animation:breath 6s ease-in-out infinite}
  @keyframes breath{
    0%,100%{transform:scaleX(.42) scaleY(.52);opacity:.3;
      box-shadow:0 0 60px 22px rgba(110,170,255,.10)}
    50%{transform:scaleX(1.18) scaleY(.94);opacity:.95;
      box-shadow:0 0 130px 65px rgba(110,170,255,.22),0 0 240px 110px rgba(160,205,255,.11)}}
  /* the coherence: four rings now, era-colored, each on its own slow orbit */
  .ring{position:absolute;border-radius:50%;pointer-events:none}
  .r1{inset:-22%;animation:spin1 9s linear infinite;
    background:conic-gradient(from 0deg,transparent 0%,rgba(78,203,102,.7) 12%,transparent 28%,rgba(227,179,29,.6) 48%,transparent 62%,rgba(225,79,225,.65) 80%,transparent 95%);
    -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#000 calc(100% - 3.5px),#000 100%,transparent 100%);
    mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#000 calc(100% - 3.5px),#000 100%,transparent 100%)}
  .r2{inset:-13%;animation:spin2 13s linear infinite;
    background:conic-gradient(from 120deg,transparent 0%,rgba(66,164,255,.65) 20%,transparent 40%,rgba(240,127,60,.6) 60%,transparent 80%,rgba(227,179,29,.5) 95%,transparent 100%);
    -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 3.5px),#000 calc(100% - 3px),#000 100%,transparent 100%);
    mask:radial-gradient(farthest-side,transparent calc(100% - 3.5px),#000 calc(100% - 3px),#000 100%,transparent 100%)}
  .r3{inset:-31%;animation:spin1 18s linear infinite reverse;
    background:conic-gradient(from 240deg,transparent 0%,rgba(227,179,29,.45) 10%,transparent 25%,rgba(225,79,225,.5) 45%,transparent 60%,rgba(78,203,102,.42) 75%,transparent 90%);
    -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 2.5px),#000 100%,transparent 100%);
    mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 2.5px),#000 100%,transparent 100%)}
  .r4{inset:-42%;animation:spin2 26s linear infinite;
    background:conic-gradient(from 60deg,transparent 0%,rgba(66,164,255,.32) 14%,transparent 30%,rgba(240,127,60,.3) 52%,transparent 68%,rgba(160,205,255,.28) 86%,transparent 98%);
    -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 2.5px),#000 calc(100% - 2px),#000 100%,transparent 100%);
    mask:radial-gradient(farthest-side,transparent calc(100% - 2.5px),#000 calc(100% - 2px),#000 100%,transparent 100%)}
  @keyframes spin1{to{transform:rotate(360deg)}}
  @keyframes spin2{to{transform:rotate(-360deg)}}
  /* the sun behind the head: a warm, peaceful light that was always there —
     it just needed someone to sit still enough to see it */
  .sun{position:absolute;left:50%;top:4%;transform:translate(-50%,-32%);width:160%;aspect-ratio:1;
    border-radius:50%;pointer-events:none;
    background:radial-gradient(circle,rgba(255,228,156,.6) 0%,rgba(255,204,116,.3) 28%,rgba(255,182,92,.12) 52%,transparent 70%);
    animation:sunbreathe 6s ease-in-out infinite}
  @keyframes sunbreathe{0%,100%{opacity:.65;transform:translate(-50%,-32%) scale(.94)}
    50%{opacity:1;transform:translate(-50%,-32%) scale(1.07)}}
  /* the pulse: rings of warmth leaving the heart on each beat, reaching further now */
  .shimmer{position:absolute;inset:0;border-radius:50%;pointer-events:none;
    animation:shim 1.75s ease-out infinite}
  .shimmer.d{animation-delay:.25s}
  @keyframes shim{
    0%{transform:scale(1);opacity:.55;box-shadow:0 0 12px 3px rgba(255,196,120,.5),0 0 30px 7px rgba(255,160,90,.24)}
    10%{transform:scale(1.14);opacity:.65;box-shadow:0 0 22px 9px rgba(255,196,120,.55),0 0 44px 14px rgba(255,160,90,.32)}
    50%{transform:scale(1.7);opacity:.18;box-shadow:0 0 38px 22px rgba(255,196,120,.18),0 0 74px 30px rgba(255,160,90,.09)}
    100%{transform:scale(2.15);opacity:0;box-shadow:0 0 48px 28px rgba(255,196,120,0)}}
  .heart{position:relative;width:100%;height:100%;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 38% 32%,#2a2545,#171331 68%,#100d24);
    border:1.5px solid rgba(255,220,160,.3);
    box-shadow:0 0 0 1px rgba(255,255,255,.05),0 18px 60px rgba(0,0,0,.55),
      0 0 70px 12px rgba(160,205,255,.13),
      inset 0 3px 16px rgba(255,220,160,.10);
    animation:beat 1.75s ease-in-out infinite}
  @keyframes beat{0%{transform:scale(1)}8%{transform:scale(1.06)}15%{transform:scale(1)}
    22%{transform:scale(1.04)}30%{transform:scale(1)}100%{transform:scale(1)}}
  .heart span{font-size:min(140px,29vw);line-height:1;user-select:none;-webkit-user-select:none}
  /* the qi: what the breath gathers leaves through the floor of the bubble — golden
     beads dripping down into the ground, where the mycelium picks them up (a matching
     golden seed feeds the root web from the same spot, just below the fold) */
  .qi{position:absolute;left:50%;top:74%;transform:translateX(-50%);width:18px;height:44%;
    pointer-events:none;
    background:radial-gradient(circle 3.5px at 50% 9px,rgba(255,224,150,.95),rgba(255,196,120,.4) 62%,transparent 72%);
    background-size:100% 20px;background-repeat:repeat-y;
    animation:qidrip 1.1s linear infinite;
    -webkit-mask:linear-gradient(180deg,transparent 0,#000 26%,#000 100%);
    mask:linear-gradient(180deg,transparent 0,#000 26%,#000 100%)}
  .qi::before{content:'';position:absolute;inset:0 4px;border-radius:5px;
    background:linear-gradient(180deg,transparent,rgba(255,205,130,.16) 40%,rgba(255,205,130,.3));
    animation:qibreathe 6s ease-in-out infinite}
  @keyframes qidrip{to{background-position:0 20px}}
  @keyframes qibreathe{0%,100%{opacity:.35}50%{opacity:1}}
  @media (prefers-reduced-motion:reduce){
    .breath,.shimmer,.heart,.ring,.halo,.qi,.qi::before,.sun{animation:none}
    .breath{transform:scaleX(.8) scaleY(.7);opacity:.6}
    .shimmer{opacity:0}}

  /* the enter button downstairs still needs its river */
  @keyframes flow{to{background-position:-320% 0}}

  /* ================= below the fold: underground. the descent. ================= */
  .under{position:relative;background:linear-gradient(180deg,var(--soil) 0,
      color-mix(in srgb,var(--soil) 55%,var(--deep)) 18%,var(--deep) 70%,var(--deep) 100%)}
  .under::before{content:'';position:absolute;top:0;left:0;right:0;height:7px;z-index:3;
    background:linear-gradient(180deg,color-mix(in srgb,#8a6a48 55%,var(--soil)),transparent)}
  #myc,#flow{position:absolute;inset:0;width:100%;height:100%;display:block}
  #flow{z-index:1}
  /* the wordmark rides up in the root zone, where the threads are thickest */
  .undercore{position:relative;z-index:2;min-height:112svh;display:flex;flex-direction:column;
    align-items:center;justify-content:flex-start;text-align:center;
    padding:clamp(70px,13svh,150px) 18px 22svh}
  .wordpool{position:relative;padding:30px 10px}
  .wordpool::before{content:'';position:absolute;inset:-50px -110px;z-index:-1;pointer-events:none;
    background:radial-gradient(56% 56% at 50% 50%,color-mix(in srgb,var(--deep) 82%,transparent),transparent 72%)}
  h1.brand{margin:0 0 14px;font-family:var(--serif);font-weight:640;
    font-size:clamp(52px,11.5vw,150px);line-height:.9;letter-spacing:-.015em}
  /* the domain rides along at half height, wearing gold — a gift tag on the name */
  .brand .tld{font-size:.44em;font-weight:560;
    background:linear-gradient(180deg,#e3b31d 22%,#f6df9a 96%);
    -webkit-background-clip:text;background-clip:text;color:transparent}
  /* six letters, five inks — the wheel comes back around */
  .brand span{display:inline-block;background:linear-gradient(180deg,var(--lc) 22%,color-mix(in srgb,var(--lc) 62%,#fff) 96%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    transition:transform .35s cubic-bezier(.2,1.6,.4,1)}
  .brand span:hover{transform:translateY(-7px) rotate(-2deg)}
  .brand .l1{--lc:#4ecb66} .brand .l2{--lc:#e3b31d} .brand .l3{--lc:#f07f3c}
  .brand .l4{--lc:#e14fe1} .brand .l5{--lc:#42a4ff} .brand .l6{--lc:#4ecb66}
  .expansion{font:600 12px/1.9 var(--mono);letter-spacing:.3em;text-transform:uppercase;color:#8fa892}
  .expansion .w1{color:#4ecb66} .expansion .w2{color:#e3b31d} .expansion .w3{color:#f07f3c}
  .expansion .w4{color:#e14fe1} .expansion .w5{color:#42a4ff}
  /* the word has many translations; the page tries them on, one at a time —
     click it to fly through them yourself */
  .expansion .ddef{display:inline-block;transition:opacity .6s ease;cursor:pointer}
  .expansion .ddef:hover{color:#cfe3cf}
  .expansion .ddef.out{opacity:0}
  .expansion .ddef.quick{transition-duration:.18s}
  /* the small print: alpha, mentioned the way a friend would — right under the door */
  .btw{margin:26px auto 0;max-width:420px;font:italic 400 13.5px/1.6 var(--serif);color:#8fa892}

  /* ---- the gate: the door sits down among the deepest roots ---- */
  .gate{position:relative;margin-top:34svh;text-align:center}
  a.enter{position:relative;display:inline-flex;align-items:center;gap:14px;
    padding:25px 60px;border-radius:999px;text-decoration:none;isolation:isolate;
    font:640 27px/1 var(--serif);letter-spacing:.01em;color:#0b1508;
    background:linear-gradient(100deg,#4ecb66,#e3b31d,#f07f3c,#e14fe1,#42a4ff,#4ecb66,#e3b31d) 0 0/320% 100%;
    animation:flow 5s linear infinite;
    box-shadow:0 12px 46px color-mix(in srgb,var(--e1) 38%,transparent),
      0 12px 46px color-mix(in srgb,var(--e4) 26%,transparent),
      0 3px 14px color-mix(in srgb,var(--e5) 30%,transparent),
      inset 0 2px 7px rgba(255,255,255,.3), inset 0 -3px 10px rgba(0,0,0,.25);

<script>
const REDUCE=matchMedia('(prefers-reduced-motion: reduce)').matches;
const COARSE=matchMedia('(pointer: coarse)').matches;
const DPR=Math.min(devicePixelRatio||1,2);
const ERA=['78,203,102','227,179,29','240,127,60','225,79,225','66,164,255'];
const SEEDX=[.122,.322,.513,.711,.889];   // the five trunks, as fractions of the hero svg

// ---------- the monk changes faces, the seat stays the same ----------
(function(){
  const faces=['🧘','🧘‍♂️','🧘‍♀️','🧘🏻','🧘🏼','🧘🏽','🧘🏾','🧘🏿','🧘🏻‍♀️','🧘🏼‍♀️','🧘🏽‍♀️','🧘🏾‍♀️','🧘🏿‍♀️','🧘🏻‍♂️','🧘🏼‍♂️','🧘🏽‍♂️','🧘🏾‍♂️','🧘🏿‍♂️'];
  const el=document.getElementById('monkface');
  let i=0; try{ i=(parseInt(localStorage.getItem('dg-monk'),10)||0)%faces.length }catch(e){}
  el.textContent=faces[i];
  document.getElementById('monk').addEventListener('click',()=>{
    i=(i+1)%faces.length; el.textContent=faces[i];
    try{ localStorage.setItem('dg-monk',String(i)) }catch(e){}
  });
})();

// ---------- dharma, translated nine ways ----------
// the word refuses one english line, so the page rotates through its best attempts —
// and clicking the line flies through them by hand.
(function(){
  const defs=['what is yours to do','your right action',
    'living in alignment with your nature','the role only you can play',
    'your path of right action','your deepest responsibility',
    'the order you are here to serve','what the moment asks of you',
    'your unique path of right action'];
  const el=document.getElementById('ddef'); if(!el) return;
  let i=0, timer=0, busy=false;
  function advance(quick){
    if(busy) return; busy=true;
    el.classList.toggle('quick',!!quick);
    el.classList.add('out');
    setTimeout(()=>{ i=(i+1)%defs.length; el.textContent=defs[i];
      el.classList.remove('out'); busy=false; }, quick?190:620);
  }
  function arm(){ if(REDUCE) return; clearInterval(timer);
    timer=setInterval(()=>advance(false),4600); }
  el.addEventListener('click',()=>{ advance(true); arm(); });
  arm();
})();

// ---------- the stars ----------
(function(){
  const box=document.getElementById('stars');
  const n=COARSE?36:78;
  let h='';
  for(let i=0;i<n;i++){
    const s=(Math.random()*1.6+.6).toFixed(1);
    h+='<i class="p'+(1+(i%3))+'" style="left:'+(Math.random()*100).toFixed(2)+'%;top:'+
      (Math.random()*62).toFixed(2)+'%;width:'+s+'px;height:'+s+'px;opacity:'+(.25+Math.random()*.5).toFixed(2)+'"></i>';
  }
  box.innerHTML=h;
})();

// ---------- the mycelium ----------
// hyphae grow down from the five trunks, wander, branch, and braid the dark together.
// each trunk's threads carry a trace of its own canopy color. glow is geometry (fat soft
// stroke under a thin bright one), never a blur filter. a second canvas on top carries
// the resources: bright beads that travel the finished paths, trade routes in the dark.
(function(){
  const cv=document.getElementById('myc'); if(!cv) return;
  const ov=document.getElementById('flow');
  const ctx=cv.getContext('2d'), octx=ov.getContext('2d');
  const GOLD='227,196,120', MOSS='127,174,114', QI='255,214,130';
  const HUES=ERA.concat([QI]);   // hue 5 is the monk's — brighter than the trees'
  let W=0,H=0,tips=[],segs=[],paths=[],packets=[],grown=false,raf=0,seen=true;

  function size(){
    const r=cv.parentElement.getBoundingClientRect();
    W=Math.round(r.width); H=Math.round(r.height);
    [cv,ov].forEach(c=>{ c.width=W*DPR; c.height=H*DPR; });
    ctx.setTransform(DPR,0,0,DPR,0,0); octx.setTransform(DPR,0,0,DPR,0,0);
    ctx.lineCap='round'; octx.lineCap='round';
    seed(); if(REDUCE){ while(!grown) step(64); }
  }
  function seed(){
    tips=[]; segs=[]; paths=[]; packets=[]; grown=false;
    ctx.clearRect(0,0,W,H); octx.clearRect(0,0,W,H);
    SEEDX.forEach((fx,i)=>{ const n=COARSE?2:3;
      for(let k=0;k<n;k++) tips.push({x:fx*W+(Math.random()-.5)*30, y:-4,
        a:(Math.random()-.5)*.7, w:2.1+Math.random()*.7, hue:i, pts:[]}); });
    // the monk's qi arrives here: golden threads dropping from the exact center,
    // where the bubble drips through the fold
    const mn=COARSE?3:5;
    for(let k=0;k<mn;k++) tips.push({x:.5*W+(Math.random()-.5)*18, y:-4,
      a:(Math.random()-.5)*.45, w:2.6+Math.random()*.8, hue:5, pts:[]});
  }
  function drawSeg(s){
    ctx.strokeStyle='rgba('+s.c+',.07)'; ctx.lineWidth=s.w*3.2;
    ctx.beginPath(); ctx.moveTo(s.x1,s.y1); ctx.lineTo(s.x2,s.y2); ctx.stroke();
    ctx.strokeStyle='rgba('+s.c+','+s.al+')'; ctx.lineWidth=s.w;
    ctx.beginPath(); ctx.moveTo(s.x1,s.y1); ctx.lineTo(s.x2,s.y2); ctx.stroke();
  }
  function retire(t){ if(t.pts.length>7) paths.push({pts:t.pts,hue:t.hue}); }
  function step(budget){
    let n=0;
    for(let i=tips.length-1;i>=0&&n<budget;i--){
      const t=tips[i]; n++;
      const x1=t.x,y1=t.y;
      if(!t.pts.length) t.pts.push([x1,y1]);
      t.a+=(Math.random()-.5)*.5; t.a=Math.max(-1.15,Math.min(1.15,t.a));
      const len=4+Math.random()*6;
      t.x+=Math.sin(t.a)*len; t.y+=Math.cos(t.a)*len;
      t.pts.push([t.x,t.y]);
      const depth=Math.max(0,1-(t.y/H)*.75);
      const roll=Math.random();
      const s={x1,y1,x2:t.x,y2:t.y,w:t.w,
        c:t.hue===5?(roll<.6?QI:GOLD):(roll<.26?ERA[t.hue]:(roll<.5?MOSS:GOLD)),
        al:(.16+t.w*.14)*depth+(t.hue===5?.12:.04)};
      segs.push(s); drawSeg(s);
      if(Math.random()<.055 && t.w>.55 && tips.length<(COARSE?90:170))
        tips.push({x:t.x,y:t.y,a:t.a+(Math.random()<.5?1:-1)*(.5+Math.random()*.6),
          w:t.w*.72,hue:t.hue,pts:[[t.x,t.y]]});
      if(Math.random()<.02) t.w*=.9;
      if(t.w<.32||t.y>H+8||t.x<-30||t.x>W+30){ retire(t); tips.splice(i,1); }
    }
    if(!tips.length||segs.length>(COARSE?7000:16000)){
      tips.forEach(retire); tips=[]; grown=true; }
  }
  // ---- the resources ----
  function spawn(){
    if(!paths.length) return;
    const p=paths[(Math.random()*paths.length)|0];
    packets.push({p,i:0,v:.8+Math.random()*1.6,
      c:Math.random()<.55?HUES[p.hue]:GOLD});
  }
  function moveResources(){
    octx.clearRect(0,0,W,H);
    const want=COARSE?6:14;
    while(packets.length<want && paths.length) spawn();
    for(let k=packets.length-1;k>=0;k--){
      const pk=packets[k]; pk.i+=pk.v;
      const pts=pk.p.pts, idx=pk.i|0;
      if(idx>=pts.length-1){ packets.splice(k,1); continue; }
      // the tail: the last few steps, fading out behind the bead
      octx.lineWidth=1.4;
      for(let j=Math.max(1,idx-7);j<=idx;j++){
        const a=.35*(1-(idx-j)/8);
        octx.strokeStyle='rgba('+pk.c+','+a.toFixed(3)+')';
        octx.beginPath(); octx.moveTo(pts[j-1][0],pts[j-1][1]); octx.lineTo(pts[j][0],pts[j][1]); octx.stroke();
      }
      const [x,y]=pts[idx];
      octx.fillStyle='rgba('+pk.c+',.14)';
      octx.beginPath(); octx.arc(x,y,6,0,7); octx.fill();
      octx.fillStyle='rgba(255,250,230,.9)';
      octx.beginPath(); octx.arc(x,y,1.8,0,7); octx.fill();
    }
  }
  function frame(){
    raf=0;
    if(seen&&!REDUCE){
      if(!grown) step(COARSE?26:52);
      moveResources();
      raf=requestAnimationFrame(frame);
    }
  }
  new IntersectionObserver(es=>{ seen=es[0].isIntersecting;
    if(seen&&!raf&&!REDUCE) raf=requestAnimationFrame(frame); },{rootMargin:'120px'})
    .observe(cv);
  addEventListener('resize',()=>{ clearTimeout(size._t); size._t=setTimeout(size,180); },{passive:true});
  size(); if(!REDUCE) raf=requestAnimationFrame(frame);
})();

</script>
